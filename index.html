<!DOCTYPE html>

<head>

    <script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #06070a; color: #fff; overflow-x: hidden; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .anim-trans { transition: all 0.3s ease; }

        .ambient-glow { position: absolute; border-radius: 50%; animation: floatGlow 15s infinite alternate ease-in-out; }
        .glow-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(66,230,245,0.04) 0%, transparent 70%); }
        .glow-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(232,28,255,0.04) 0%, transparent 70%); animation-direction: alternate-reverse; }
        @keyframes floatGlow { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(5%, 5%) scale(1.1); } }
        .glass-panel { background: rgba(15,18,25,0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.04); border-radius: 24px; }
        .glass-panel:hover { border-color: rgba(255,255,255,0.08); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .premium-title { font-family: 'Montserrat', sans-serif; font-weight: 900; background: linear-gradient(135deg, #fff 30%, #a1a1aa 100%); -webkit-background-clip: text; color: transparent; }
        .premium-title span { color: #42e6f5; text-shadow: 0 0 30px rgba(66,230,245,0.5); }
        .social-icon { display: flex; align-items: center; justify-content: center; width: 46px; height: 46px; background: rgba(255,255,255,0.02); border-radius: 50%; color: #a1a1aa; border: 1px solid rgba(255,255,255,0.05); }
        .social-icon:hover { color: #fff; transform: translateY(-4px) scale(1.05); }
        .social-ig:hover { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); box-shadow: 0 10px 20px rgba(220,39,67,0.3); }
        .social-tk:hover { background: #000; border-color: #42e6f5; box-shadow: 0 10px 20px rgba(66,230,245,0.2); }
        .social-sc:hover { background: #ff5500; box-shadow: 0 10px 20px rgba(255,85,0,0.3); }
        .social-yt:hover { background: #f00; box-shadow: 0 10px 20px rgba(255,0,0,0.3); }
        .viewport-container { width: 100%; height: 55vh; min-height: 420px; position: relative; background: #040508; border-radius: 20px; overflow: hidden; cursor: grab; }
        @media (min-width: 1024px) { .viewport-container { height: 68vh; } }
        .zoom-layer { width: 100%; height: 100%; transform-origin: 0 0; touch-action: none; }
        .zoom-layer svg { width: 100%; height: 100%; shape-rendering: geometricPrecision; text-rendering: geometricPrecision; }
        path, polygon { vector-effect: non-scaling-stroke; stroke-linejoin: round; stroke-linecap: round; }
        .muni { cursor: pointer; pointer-events: all; stroke-width: 1px; }
        .muni-base { fill: #0d1014; stroke: rgba(255,255,255,0.15); }
        .muni-base:hover { fill: #1a202a; stroke: rgba(255,255,255,0.3); }
        .muni-base.muni-selected { fill: #1c1524; stroke: #e81cff; filter: drop-shadow(0 0 5px rgba(232,28,255,0.3)); }
        .muni-unlocked { fill: #143d4a; stroke: #42e6f5; }
        .muni-unlocked:hover { fill: rgba(66,230,245,0.4); }
        .muni-unlocked.muni-selected { fill: #e81cff; stroke: #fff; filter: drop-shadow(0 0 10px rgba(232,28,255,0.6)); }
        .comp-polygon { fill: rgba(232,28,255,0.04); stroke: rgba(232,28,255,0.25); stroke-width: 0.5px; cursor: pointer; pointer-events: auto; }
        .comp-polygon:hover, .hotspot-active { fill: rgba(232,28,255,0.25); stroke: #e81cff; stroke-width: 1.5px; filter: drop-shadow(0 0 8px rgba(232,28,255,0.6)); }
        .animate-neon { animation: neonPulse 2s infinite ease-in-out; }
        @keyframes neonPulse { 0%, 100% { filter: drop-shadow(0 0 3px rgba(66,230,245,0.4)); } 50% { filter: drop-shadow(0 0 10px rgba(66,230,245,0.8)); } }
        .nav-link { color: #8a8d93; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; cursor: pointer; position: relative; }
        .nav-link:hover, .nav-link.active { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -6px; left: 0; background-color: #42e6f5; transition: width 0.3s; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .admin-drag-dot { touch-action: none; z-index: 50; cursor: grab; }

    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, remove, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ apiKey: "AIzaSyB5TFM9ZN-X1dvLdIGJX9quK_2jhq_8gqI", authDomain: "djvaquero-851e8.firebaseapp.com", databaseURL: "https://djvaquero-851e8-default-rtdb.europe-west1.firebasedatabase.app", projectId: "djvaquero-851e8" });
        const db = getDatabase(app), $ = id => document.getElementById(id);
        
        let dbData = { municipalities:{}, components:{}, mashups:{} }, currMuni = null, isMov = false, actTab = 'tour', sc=1, pX=0, pY=0, reqFr=null, cFigs=[], cPts=[], sX=0, sY=0, pan=false;
        const vp = $('tour-viewport'), tLay = $('tour-layer');

        const navObs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting){ document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); const nk = document.querySelector(`.nav-link[href="#${e.target.id}"]`); if(nk) nk.classList.add('active'); }}), {threshold:0.3});
        ['sec-tour','sec-setup','sec-mashups'].forEach(id => navObs.observe($(id)));

        onValue(ref(db, '/'), s => { dbData = s.val() || { municipalities:{}, components:{}, mashups:{} }; renderMap(); renderComp(); renderMash(); updateDds(); const mId = $('a-muni-id').value; if(mId) popEv(mId); });

        const uLbls = () => {
            const lg = $('labels-group'); if(!lg) return;
            lg.className.baseVal = sc < 2.2 ? 'opacity-0 transition-opacity duration-300 pointer-events-none' : 'opacity-100 transition-opacity duration-300 pointer-events-none';
            if(sc < 2.2) return;
            const fS = 11/sc, vW = vp.clientWidth, vH = vp.clientHeight, r = vp.getBoundingClientRect(), occ = [];
            lg.querySelectorAll('.muni-label').forEach(l => {
                const m = dbData.municipalities[l.dataset.id];
                if(!m?.name || /^zona/i.test(m.name)) return l.style.opacity = '0';
                const un = m.status === 'unlocked';
                l.setAttribute('fill', un ? '#42e6f5' : 'rgba(255,255,255,0.7)'); l.setAttribute('font-size', `${un ? fS*1.1 : fS}px`); l.setAttribute('font-weight', un ? '900' : '500');
                const br = l.getBoundingClientRect(), x = br.left-r.left+br.width/2, y = br.top-r.top+br.height/2;
                if(x<0 || x>vW || y<0 || y>vH) return l.style.opacity = '0';
                const b = {l:br.left, r:br.right, t:br.top, b:br.bottom};
                if(!occ.some(o => b.l-4 < o.r && b.r+4 > o.l && b.t-4 < o.b && b.b+4 > o.t)) { l.style.opacity = '1'; occ.push(b); } else l.style.opacity = '0';
            });
        };
        const uTrans = () => { tLay.style.transform = `translate(${pX}px, ${pY}px) scale(${sc})`; uLbls(); reqFr=null; };
        const stPan = (x,y) => { sX = x-pX; sY = y-pY; pan = true; isMov = false; vp.style.cursor = 'grabbing'; };
        const mvPan = (x,y) => { if(!pan) return; isMov = true; pX = x-sX; pY = y-sY; if(!reqFr) reqFr = requestAnimationFrame(uTrans); };
        
        vp.onmousedown = e => stPan(e.clientX, e.clientY); window.addEventListener('mousemove', e => mvPan(e.clientX, e.clientY)); window.addEventListener('mouseup', () => { pan=false; vp.style.cursor='grab'; });
        vp.addEventListener('touchstart', e => { isMov=false; if(e.touches.length===1) stPan(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
        vp.addEventListener('touchmove', e => { if(pan && e.touches.length===1) mvPan(e.touches[0].clientX, e.touches[0].clientY); else if(e.touches.length===2) { e.preventDefault(); const t1=e.touches[0], t2=e.touches[1], d = Math.hypot(t1.clientX-t2.clientX, t1.clientY-t2.clientY), rb = vp.getBoundingClientRect(), mx = ((t1.clientX+t2.clientX)/2)-rb.left, my = ((t1.clientY+t2.clientY)/2)-rb.top; sc = Math.max(0.6, Math.min(sc*(d/(vp.dataset.sd||d)), 10)); pX = mx - ((mx-pX)/sc)*sc; pY = my - ((my-pY)/sc)*sc; vp.dataset.sd = d; if(!reqFr) reqFr = requestAnimationFrame(uTrans); } }, {passive:false});
        vp.addEventListener('touchend', () => pan=false); vp.addEventListener('wheel', e => { e.preventDefault(); const rb = vp.getBoundingClientRect(), tx = (e.clientX-rb.left-pX)/sc, ty = (e.clientY-rb.top-pY)/sc; sc = Math.max(0.6, Math.min(e.deltaY<0 ? sc*1.1 : sc/1.1, 10)); pX = (e.clientX-rb.left) - tx*sc; pY = (e.clientY-rb.top) - ty*sc; if(!reqFr) reqFr = requestAnimationFrame(uTrans); }, {passive:false});
        $('btn-reset-map').onclick = () => { sc=1; pX=pY=0; uTrans(); };

        fetch('salamanca.svg').then(r=>r.text()).then(h => { tLay.innerHTML = h; const s = tLay.querySelector('svg'), g = document.createElementNS("http://www.w3.org/2000/svg","g"); g.id = 'labels-group'; g.className.baseVal = 'opacity-0 transition-opacity duration-300 pointer-events-none'; s.style.pointerEvents = 'none'; s.appendChild(g); s.querySelectorAll('path, polygon').forEach((el,i) => { const id = el.id||`zona_${i}`; el.id = id; el.className.baseVal = 'muni anim-trans muni-base'; try{ const b = el.getBBox(); if(b.width>0) { const t = document.createElementNS("http://www.w3.org/2000/svg","text"); t.setAttribute("x",b.x+b.width/2); t.setAttribute("y",b.y+b.height/2); t.setAttribute("class","muni-label transition-opacity duration-200"); t.setAttribute("data-id",id); t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','central'); t.setAttribute('font-family',"'Montserrat',sans-serif"); t.setAttribute('style','text-shadow:0 1px 2px #000; text-transform:uppercase;'); g.appendChild(t); } }catch(e){} el.onclick = e => { if(isMov) return; e.stopPropagation(); selMuni(id); }; }); renderMap(); });

        const bMedia = url => url ? url.split(',').map(l => { l=l.trim(); if(!l) return ''; let ic='fa-link', t='ENLACE', bg='bg-white/5 hover:bg-white/10 text-white border-white/10'; if(l.includes('tiktok.com')){ ic='fa-tiktok'; t='TIKTOK'; bg='bg-black hover:bg-zinc-900 border-[#42e6f5]/50 text-[#42e6f5]'; }else if(l.includes('instagram.com')){ ic='fa-instagram'; t='REEL'; bg='bg-gradient-to-r from-[#f09433] to-[#bc1888] border-transparent text-white'; } return `<a href="${l}" target="_blank" class="inline-flex mt-3 mr-2 px-4 py-1.5 ${bg} text-[10px] font-black tracking-wider rounded-full border anim-trans"><i class="fa-brands ${ic} text-sm mr-2"></i>${t}</a>`; }).join('') : '';
        const renderMap = () => { Object.entries(dbData.municipalities).forEach(([id, d]) => { const e = $(id); if(e) e.className.baseVal = `muni anim-trans muni-${d.status==='unlocked'?'unlocked':'base'} ${id===currMuni?'muni-selected':''}`; }); tLay.querySelectorAll('.muni-label').forEach(l => { const n = dbData.municipalities[l.dataset.id]?.name; l.textContent = (!n || /^zona/i.test(n)) ? '' : n; }); uLbls(); };
        const selMuni = id => { currMuni = id; renderMap(); const el = $(id); if(el) el.parentNode.appendChild(el); const m = dbData.municipalities[id] || {}, n = /^zona/i.test(m.name||id) ? id.replace(/_/g,' ') : (m.name||id.replace(/_/g,' ')); $('info-title').innerText = n; $('a-muni-id').value = id; $('a-muni-name').value = n; clrEv(); popEv(id); $('info-empty').classList.add('hidden'); const iEv = $('info-events'); iEv.classList.remove('hidden'); iEv.innerHTML = ''; if(m.status === 'unlocked') { $('a-muni-status').value = 'unlocked'; $('info-status').innerHTML = `<div class="w-2 h-2 rounded-full bg-djCyan"></div><span class="text-djCyan text-[10px] font-bold uppercase">FECHAS CONFIRMADAS</span>`; if(m.events) Object.values(m.events).forEach(ev => iEv.innerHTML += `<div class="bg-black/30 border border-white/5 rounded-2xl p-5 relative"><div class="absolute top-0 left-0 w-1 h-full bg-djCyan rounded-l-2xl"></div><h4 class="text-lg font-display font-black">${ev.place}</h4><p class="text-xs text-djCyan font-bold uppercase">${ev.date}</p>${ev.details?`<p class="text-xs text-gray-400 mt-1">${ev.details}</p>`:''}${bMedia(ev.media)}</div>`); else iEv.innerHTML = `<p class="text-gray-500 text-xs text-center py-6">Próximamente.</p>`; } else { $('a-muni-status').value = 'locked'; $('info-status').innerHTML = `<div class="w-2 h-2 rounded-full bg-gray-600"></div><span class="text-gray-500 text-[10px] font-bold uppercase">Zona Oculta</span>`; iEv.innerHTML = `<p class="text-gray-500 text-xs text-center py-6">Contrataciones abiertas.</p>`; } iEv.innerHTML += `<a href="https://instagram.com/djvaquero__" target="_blank" class="block bg-gradient-to-r from-djMagenta to-purple-600 text-white w-full py-3.5 rounded-xl text-center text-xs font-black mt-4 anim-trans hover:scale-[1.02]">CONTRATACIÓN DIRECTA</a>`; };

        $('search-muni').oninput = e => { const v = e.target.value.toLowerCase().trim(), rL = $('search-results'); rL.innerHTML = ''; if(v.length<2) return rL.classList.add('hidden'); const m = Object.entries(dbData.municipalities).filter(([_,d])=>d?.name && !/^zona/i.test(d.name) && d.name.toLowerCase().includes(v)).slice(0,5); rL.classList.remove('hidden'); if(m.length) m.forEach(([id,d]) => { const li = document.createElement('li'); li.className = "px-5 py-3 hover:bg-white/5 text-xs cursor-pointer border-b border-white/5 font-medium anim-trans"; li.innerHTML = `<i class="fa-solid fa-location-dot text-djCyan mr-2"></i>${d.name}`; li.onclick = () => { selMuni(id); window.scrollTo({top: $('info-anchor').getBoundingClientRect().top+window.pageYOffset-140, behavior:'smooth'}); $('search-muni').value=''; rL.classList.add('hidden'); }; rL.appendChild(li); }); else rL.innerHTML = `<li class="px-5 py-3 text-gray-500 text-xs italic">Sin resultados</li>`; }; document.onclick = e => { if(!$('search-muni').contains(e.target)) $('search-results').classList.add('hidden'); };

        const renderMash = () => { const g = $('mashups-grid'); g.innerHTML = ''; const e = Object.entries(dbData.mashups).sort(); if(!e.length) return g.innerHTML = '<p class="text-gray-500 text-xs p-2">Vacío</p>'; e.forEach(([_,d]) => g.innerHTML += `<div class="glass-panel anim-trans bg-black/20 p-6 flex flex-col justify-between group overflow-hidden gap-4"><div><div class="w-10 h-10 rounded-full bg-djYellow/10 flex items-center justify-center mb-4 text-djYellow"><i class="fa-solid fa-music"></i></div><h4 class="font-display font-black text-md tracking-wide">${d.title}</h4></div>${d.scUrl?`<div class="w-full h-32 rounded-lg overflow-hidden border border-white/5"><iframe width="100%" height="100%" scrolling="no" frameborder="no" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(d.scUrl)}&color=%23f5d442&auto_play=false&hide_related=true&show_comments=false&show_teaser=false&visual=true"></iframe></div>`:''}${d.dl?`<a href="${d.dl}" target="_blank" class="bg-gradient-to-r from-djYellow to-orange-400 text-black py-3 rounded-xl text-center text-xs font-black anim-trans hover:scale-[1.02]">DESCARGAR PACK</a>`:''}</div>`); };
        window.selComp = id => { document.querySelectorAll('.comp-polygon').forEach(h=>h.classList.remove('hotspot-active','animate-neon')); document.querySelectorAll(`.comp-id-${id}`).forEach(h=>h.classList.add('hotspot-active','animate-neon')); const c = dbData.components[id]; if(!c) return; $('setup-info').classList.remove('hidden'); $('setup-t').innerText = c.title; $('setup-d').innerText = c.desc; };
        const renderComp = () => { const ov = $('setup-svg'); ov.innerHTML = ''; if(actTab==='setup' && !$('admin-panel').classList.contains('hidden')) return; Object.entries(dbData.components).forEach(([id,c]) => { (c.figures||[]).forEach(f => { if(f.length>2) { const p = document.createElementNS("http://www.w3.org/2000/svg","polygon"); p.setAttribute("points", f.map(pt=>`${pt.x},${pt.y}`).join(' ')); p.setAttribute("class",`comp-polygon anim-trans comp-id-${id}`); p.onclick = e => { e.stopPropagation(); selComp(id); }; ov.appendChild(p); } }); }); };

        let cc=0; $('site-title').onclick = () => { if(++cc>=3 && prompt("Pass:")==="1524") $('admin-panel').classList.remove('hidden'); setTimeout(()=>cc=0,800); };
        $('btn-close-admin').onclick = () => { $('admin-panel').classList.add('hidden'); toggleAdminMode(false); };
        let drA = false, dX, dY, dL, dT; $('admin-header').onmousedown = e => { if(e.target.closest('button')) return; drA=true; dX=e.clientX; dY=e.clientY; const r=$('admin-panel').getBoundingClientRect(); dL=r.left; dT=r.top; }; window.addEventListener('mousemove', e => { if(drA) { $('admin-panel').style.left = `${dL+(e.clientX-dX)}px`; $('admin-panel').style.top = `${dT+(e.clientY-dY)}px`; }}); window.addEventListener('mouseup', () => drA=false);
        ['tour','setup','mashups'].forEach(t => $(`tab-${t}`).onclick = () => { actTab=t; ['tour','setup','mashups'].forEach(o => { $(`tab-${o}`).className = o===t ? `flex-1 py-3.5 text-${{tour:'djCyan',setup:'djMagenta',mashups:'djYellow'}[t]} border-b-2 border-current anim-trans` : 'flex-1 py-3.5 text-gray-500 border-b-2 border-transparent hover:text-white anim-trans'; $(`sec-a-${o}`).classList[o===t?'remove':'add']('hidden'); }); toggleAdminMode(t==='setup'); });

        const toggleAdminMode = act => { $('setup-img').classList[act?'add':'remove']('admin-setup-mode'); $('admin-hint').classList[act?'remove':'add']('hidden'); $('admin-pts').classList[act?'remove':'add']('hidden'); act ? renderAdminPts() : renderComp(); };
        const popEv = id => { const m = dbData.municipalities[id], l = $('a-ev-list'); l.innerHTML = ''; if(m?.events) Object.entries(m.events).forEach(([eid,ev]) => l.innerHTML+=`<div class="flex justify-between items-center bg-black/40 p-2 rounded text-xs"><span>${ev.place}</span><div class="flex gap-2"><button class="text-djCyan anim-trans hover:scale-110" onclick="window.edEv('${id}','${eid}')"><i class="fa-solid fa-pen"></i></button><button class="text-red-500 anim-trans hover:scale-110" onclick="if(confirm('¿Borrar?')) remove(ref(db,'municipalities/${id}/events/${eid}'))"><i class="fa-solid fa-trash"></i></button></div></div>`); };
        const clrEv = () => { ['a-ev-id','a-ev-p','a-ev-d','a-ev-desc','a-ev-m'].forEach(i=>$(i).value=''); $('a-ev-t').innerHTML='Añadir Fecha'; $('btn-sv-ev').innerText='GUARDAR'; $('btn-cl-ev').classList.add('hidden'); };
        window.edEv = (mid, eid) => { const ev = dbData.municipalities[mid].events[eid]; $('a-ev-id').value=eid; $('a-ev-p').value=ev.place; $('a-ev-d').value=ev.date; $('a-ev-desc').value=ev.details||''; $('a-ev-m').value=ev.media||''; $('btn-cl-ev').classList.remove('hidden'); }; $('btn-cl-ev').onclick = clrEv;
        $('btn-sv-ev').onclick = () => { const id = $('a-muni-id').value, p=$('a-ev-p').value, eid=$('a-ev-id').value; if(!id) return; update(ref(db, `municipalities/${id}`), {status:$('a-muni-status').value, name:$('a-muni-name').value||id}); if(p||eid) { const pd = {place:p, date:$('a-ev-d').value, details:$('a-ev-desc').value, media:$('a-ev-m').value}; (eid?update(ref(db,`municipalities/${id}/events/${eid}`),pd):push(ref(db,`municipalities/${id}/events`),pd)).then(()=>{clrEv();selMuni(id);}); } else selMuni(id); };

        const updateDds = () => { const c=$('a-comp-sel'), m=$('a-mash-sel'), cv=c.value, mv=m.value; c.innerHTML='<option value="NEW">NUEVO COMPONENTE</option>'; Object.entries(dbData.components).forEach(([id,d])=>c.innerHTML+=`<option value="${id}">${d.title}</option>`); if(dbData.components[cv]) c.value=cv; m.innerHTML='<option value="NEW">NUEVO MASHUP</option>'; Object.entries(dbData.mashups).forEach(([id,d])=>m.innerHTML+=`<option value="${id}">${d.title}</option>`); if(dbData.mashups[mv]) m.value=mv; };
        
        const renderAdminPts = () => { const ul=$('a-comp-pts'), dc=$('admin-pts'), ov=$('setup-svg'); ul.innerHTML=''; dc.innerHTML=''; ov.innerHTML=''; cFigs.forEach((f,i) => { const p = document.createElementNS("http://www.w3.org/2000/svg","polygon"); p.setAttribute("points", f.map(pt=>`${pt.x},${pt.y}`).join(' ')); p.setAttribute("fill","rgba(66,230,245,0.2)"); p.setAttribute("stroke","#42e6f5"); p.setAttribute("stroke-width","0.5"); ov.appendChild(p); ul.innerHTML+=`<li class="flex justify-between items-center bg-black/40 p-2 rounded border border-white/5 text-[11px]">Figura ${i+1} (${f.length} nodos)<button class="text-red-500 hover:scale-110 anim-trans" onclick="cFigs.splice(${i},1);renderAdminPts()"><i class="fa-solid fa-trash"></i></button></li>`; }); if(cPts.length) { const p = document.createElementNS("http://www.w3.org/2000/svg","polygon"); p.setAttribute("points", cPts.map(pt=>`${pt.x},${pt.y}`).join(' ')); p.setAttribute("fill","rgba(232,28,255,0.2)"); p.setAttribute("stroke","#e81cff"); p.setAttribute("stroke-width","0.5"); p.setAttribute("stroke-dasharray","1"); ov.appendChild(p); } cPts.forEach((pt,i) => { const dt = document.createElement('div'); dt.className="absolute w-3 h-3 bg-djMagenta rounded-full -translate-x-1/2 -translate-y-1/2 border border-white admin-drag-dot shadow-[0_0_8px_#e81cff] z-50"; dt.style.left=pt.x+'%'; dt.style.top=pt.y+'%'; const mm = e => { e.preventDefault(); const r=$('setup-wrapper').getBoundingClientRect(), cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY; let x=Math.max(0,Math.min(100,((cx-r.left)/r.width)*100)), y=Math.max(0,Math.min(100,((cy-r.top)/r.height)*100)); dt.style.left=x+'%'; dt.style.top=y+'%'; cPts[i]={x:parseFloat(x.toFixed(1)), y:parseFloat(y.toFixed(1))}; const pd=ov.querySelector('polygon:last-child'); if(pd) pd.setAttribute("points",cPts.map(p=>`${p.x},${p.y}`).join(' ')); }; const mu = () => { window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); window.removeEventListener('touchmove',mm); window.removeEventListener('touchend',mu); renderAdminPts(); }; dt.onmousedown = e => { e.stopPropagation(); window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu); }; dt.ontouchstart = e => { e.stopPropagation(); window.addEventListener('touchmove',mm,{passive:false}); window.addEventListener('touchend',mu); }; dc.appendChild(dt); }); };
        $('btn-add-fig').onclick = () => { if(cPts.length>2) { cFigs.push([...cPts]); cPts=[]; renderAdminPts(); } else alert("Mínimo 3 nodos"); }; $('btn-cl-pts').onclick = () => { cPts=[]; renderAdminPts(); };
        $('a-comp-sel').onchange = e => { const v=e.target.value; if(v==='NEW') { $('a-comp-t').value=''; $('a-comp-d').value=''; cFigs=[]; cPts=[]; $('btn-dl-cp').classList.add('hidden'); } else { const d=dbData.components[v]; $('a-comp-t').value=d.title; $('a-comp-d').value=d.desc; cFigs=d.figures?[...d.figures]:(d.points?[[...d.points]]:[]); cPts=[]; $('btn-dl-cp').classList.remove('hidden'); } renderAdminPts(); };
        $('setup-wrapper').onclick = e => { if(actTab==='setup' && !$('admin-panel').classList.contains('hidden') && !e.target.classList.contains('admin-drag-dot')) { const r=$('setup-wrapper').getBoundingClientRect(), x=((e.clientX-r.left)/r.width)*100, y=((e.clientY-r.top)/r.height)*100; cPts.push({x:parseFloat(x.toFixed(1)),y:parseFloat(y.toFixed(1))}); renderAdminPts(); } };
        $('btn-sv-cp').onclick = () => { if(!$('a-comp-t').value) return; if(cPts.length>2) { cFigs.push([...cPts]); cPts=[]; } set(ref(db, `components/${$('a-comp-sel').value==='NEW'?`comp_${Date.now()}`:$('a-comp-sel').value}`), {title:$('a-comp-t').value, desc:$('a-comp-d').value, figures:cFigs}); renderAdminPts(); };
        $('btn-dl-cp').onclick = () => { if(confirm('¿Borrar?')) remove(ref(db, `components/${$('a-comp-sel').value}`)).then(()=>{ $('a-comp-sel').value='NEW'; $('a-comp-sel').dispatchEvent(new Event('change')); }); };

        $('a-mash-sel').onchange = e => { const v=e.target.value; if(v==='NEW') { ['a-mash-t','a-mash-dl','a-mash-sc'].forEach(id=>$(id).value=''); $('btn-dl-ms').classList.add('hidden'); } else { const d=dbData.mashups[v]; $('a-mash-t').value=d.title||''; $('a-mash-dl').value=d.dl||''; $('a-mash-sc').value=d.scUrl||''; $('btn-dl-ms').classList.remove('hidden'); } };
        $('btn-sv-ms').onclick = async () => { const id = $('a-mash-sel').value==='NEW'?`mash_${Date.now()}`:$('a-mash-sel').value, t=$('a-mash-t').value; if(!t) return; const b=$('btn-sv-ms'); b.disabled=true; b.innerHTML="GUARDANDO..."; try { await set(ref(db, `mashups/${id}`), {title:t, dl:$('a-mash-dl').value, scUrl:$('a-mash-sc').value}); b.innerText="¡GUARDADO!"; setTimeout(()=>{b.innerText="GUARDAR TRACK"; b.disabled=false;},2000); } catch(e) { b.disabled=false; b.innerText="GUARDAR TRACK"; } };
        $('btn-dl-ms').onclick = () => { if(confirm('¿Eliminar track?')) remove(ref(db, `mashups/${$('a-mash-sel').value}`)).then(()=>{ $('a-mash-sel').value='NEW'; $('a-mash-sel').dispatchEvent(new Event('change')); }); };
    </script>
