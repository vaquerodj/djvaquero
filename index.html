<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Vaquero</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { djCyan: '#00e5ff', djMagenta: '#ff00ea', djYellow: '#ffd600' }, fontFamily: { display: ['Montserrat', 'sans-serif'] } } }
    }
  </script>
  <style>
    body { background-color: #050505; color: white; overflow: hidden; margin: 0; padding: 0; }
    .view-section { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; }
    .view-section.active { display: block; }
    .overlay-panel { transform: translateY(100%); transition: transform 0.3s ease-in-out; position: absolute; bottom: 0; left: 0; width: 100%; background: #111; padding: 20px; z-index: 50; }
    .overlay-panel.open { transform: translateY(0); }
    .muni-base { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.1); stroke-width: 1px; transition: all 0.3s; cursor: pointer; }
    .muni-unlocked { fill: rgba(0,229,255,0.2); stroke: #00e5ff; stroke-width: 2px; cursor: pointer; }
    .muni-selected { fill: rgba(255,0,234,0.4) !important; stroke: #ff00ea !important; stroke-width: 3px !important; }
    .hotspot-active { fill: rgba(255,0,234,0.4); stroke: #ff00ea; stroke-width: 2px; }
  </style>
</head>
<body>

  <nav class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-black/80 backdrop-blur-md border border-white/10 rounded-2xl p-2 flex gap-2 shadow-2xl">
    <button id="btn-nav-tour" onclick="switchView('tour')" class="nav-active group relative p-1">
      <div class="w-10 h-10 rounded-xl bg-djCyan/20 text-djCyan flex items-center justify-center transition-colors">
        <i class="fa-solid fa-map-location-dot"></i>
      </div>
    </button>
    <button id="btn-nav-setup" onclick="switchView('setup')" class="group relative p-1">
      <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center transition-colors hover:bg-white/10">
        <i class="fa-solid fa-sliders"></i>
      </div>
    </button>
    <button id="btn-nav-mashups" onclick="switchView('mashups')" class="group relative p-1">
      <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center transition-colors hover:bg-white/10">
        <i class="fa-solid fa-music"></i>
      </div>
    </button>
  </nav>

  <section id="view-tour" class="view-section active">
    <div class="absolute top-20 left-4 right-4 z-40">
      <div class="relative max-w-sm mx-auto">
        <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
        <input type="text" id="search-muni" placeholder="Buscar zona..." class="w-full bg-black/60 border border-white/10 rounded-xl py-3 pl-10 pr-4 text-xs text-white focus:outline-none focus:border-djCyan">
        <ul id="search-results" class="hidden absolute top-full left-0 w-full mt-2 bg-black/90 border border-white/10 rounded-xl overflow-hidden shadow-2xl"></ul>
      </div>
    </div>
    <div id="tour-viewport" class="w-full h-full relative cursor-grab overflow-hidden">
      <div id="tour-layer" class="absolute origin-top-left"></div>
    </div>
    <button id="btn-reset-map" class="absolute bottom-6 right-6 z-40 bg-black/60 text-white w-10 h-10 rounded-full border border-white/10 flex items-center justify-center hover:bg-djCyan hover:text-black transition-colors"><i class="fa-solid fa-compress"></i></button>
    <div id="info-overlay" class="overlay-panel rounded-t-3xl border-t border-white/10">
      <div class="flex justify-between items-start mb-4">
        <div>
          <h2 id="info-title" class="text-xl font-display font-black text-white uppercase tracking-tight">ZONA</h2>
          <div id="info-status" class="flex items-center gap-2 mt-1"><div class="w-1.5 h-1.5 rounded-full bg-gray-600"></div><span class="text-gray-400 text-[9px] font-bold uppercase tracking-widest">Selecciona zona</span></div>
        </div>
        <button id="btn-close-tour" class="bg-white/10 w-8 h-8 rounded-full flex items-center justify-center text-white hover:bg-white/20"><i class="fa-solid fa-times"></i></button>
      </div>
      <div id="info-events" class="space-y-3 max-h-48 overflow-y-auto pr-1"></div>
    </div>
  </section>

  <section id="view-setup" class="view-section bg-zinc-900">
    <div id="setup-wrapper" class="w-full h-full relative overflow-hidden flex items-center justify-center">
      <img id="setup-img" src="setup.png" alt="Setup" class="max-w-full max-h-full object-contain pointer-events-none transition-opacity duration-300">
      <svg id="setup-svg" class="absolute top-0 left-0 w-full h-full pointer-events-auto" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="admin-pts" class="absolute top-0 left-0 w-full h-full pointer-events-none hidden"></div>
    </div>
    <div id="setup-overlay" class="overlay-panel rounded-t-3xl border-t border-white/10">
      <div class="flex justify-between items-start mb-2">
        <div>
          <h2 id="setup-t" class="text-lg font-display font-black text-djMagenta uppercase"></h2>
          <div id="setup-status" class="flex items-center gap-2 mt-1"></div>
        </div>
        <button id="btn-close-setup" class="bg-white/10 w-8 h-8 rounded-full flex items-center justify-center text-white hover:bg-white/20"><i class="fa-solid fa-times"></i></button>
      </div>
      <p id="setup-d" class="text-xs text-gray-400 mt-2 leading-relaxed"></p>
    </div>
  </section>

  <section id="view-mashups" class="view-section overflow-y-auto pb-24 pt-24 px-4">
    <div class="max-w-3xl mx-auto">
      <div class="flex items-center gap-3 mb-6"><i class="fa-solid fa-compact-disc text-3xl text-djYellow animate-spin-slow"></i><h2 class="text-2xl font-display font-black uppercase tracking-tight">Mashups <span class="text-djYellow">&</span> Edits</h2></div>
      <div id="mashups-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
  </section>

  <h1 id="site-title" class="absolute top-4 left-4 z-50 text-[10px] text-white/10 cursor-pointer select-none">Admin</h1>

  <div id="admin-panel" class="hidden fixed top-4 right-4 w-80 bg-black/95 border border-white/10 rounded-xl shadow-2xl z-50 flex flex-col max-h-[90vh]">
    <div id="admin-header" class="p-3 border-b border-white/10 flex justify-between items-center cursor-move bg-white/5 rounded-t-xl"><div class="flex items-center gap-2"><i class="fa-solid fa-lock text-djCyan text-xs"></i><span class="text-[10px] font-bold tracking-widest uppercase text-white">Panel Control</span></div><button id="btn-close-admin" class="text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-times"></i></button></div>
    <div class="flex text-[10px] font-bold tracking-wider uppercase"><button id="tab-tour" class="flex-1 py-2.5 text-djCyan border-b border-djCyan bg-white/[0.02] transition-colors">Tour</button><button id="tab-setup" class="flex-1 py-2.5 text-gray-500 border-b border-transparent hover:text-white transition-colors">Setup</button><button id="tab-mashups" class="flex-1 py-2.5 text-gray-500 border-b border-transparent hover:text-white transition-colors">Mshps</button></div>
    <div class="p-4 overflow-y-auto">
      <div id="sec-a-tour" class="space-y-4">
        <div class="bg-white/5 p-3 rounded-lg border border-white/10"><input type="hidden" id="a-muni-id"><input type="text" id="a-muni-name" placeholder="Nombre visible..." class="w-full bg-black/50 border border-white/10 rounded px-2 py-1.5 text-[11px] text-white focus:border-djCyan focus:outline-none mb-2"><select id="a-muni-status" class="w-full bg-black/50 border border-white/10 rounded px-2 py-1.5 text-[11px] text-gray-300 focus:border-djCyan focus:outline-none"><option value="locked">Libre</option><option value="unlocked">Confirmado</option></select></div>
        <div class="bg-white/5 p-3 rounded-lg border border-white/10"><h3 class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-2 flex items-center gap-1.5" id="a-ev-t"><i class="fa-solid fa-plus"></i> Fecha</h3><input type="hidden" id="a-ev-id"><div class="space-y-2"><input type="text" id="a-ev-p" placeholder="Lugar / Sala..." class="w-full bg-black/50 border border-white/10 rounded px-2 py-1.5 text-[11px] text-white focus:border-djCyan focus:outline-none"><input type="text" id="a-ev-d" placeholder="Fecha (ej: 24 AGO)..." class="w-full bg-black/50 border border-white/10 rounded px-2 py-1.5 text-[11px] text-white focus:border-djCyan focus:outline-none"><textarea id="a-ev-desc" placeholder="Detalles / Info extra..." rows="2" class="w-full bg-black/50 border border-white/10 rounded px-2 py-1.5 text-[11px] text-white focus:border-djCyan focus:outline-none resize-none"></textarea><input type="text" id="a-ev-m" placeholder="Link Entradas (URL)..." class="w-full bg-black/50 border border-white/10 rounded px-2 py-1.5 text-[11px] text-white focus:border-djCyan focus:outline-none"><textarea id="a-ev-embed" placeholder="Código Embed (Opcional)..." rows="2" class="w-full bg-black/50 border border-white/10 rounded px-2 py-1.5 text-[11px] text-white focus:border-djCyan focus:outline-none resize-none font-mono text-[9px]"></textarea><div class="flex gap-2"><button id="btn-cl-ev" class="flex-1 py-1.5 rounded bg-gray-600 hover:bg-gray-500 text-white text-[10px] font-bold uppercase transition-colors hidden">Cancelar</button><button id="btn-sv-ev" class="flex-1 py-1.5 rounded bg-djCyan hover:bg-cyan-400 text-black text-[10px] font-black uppercase transition-colors">Guardar</button></div></div></div>
        <div class="bg-white/5 p-3 rounded-lg border border-white/10"><h3 class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-2"><i class="fa-solid fa-list text-djCyan mr-1"></i> Confirmadas</h3><div id="a-ev-list" class="space-y-1.5"></div></div>
      </div>
      <div id="sec-a-setup" class="hidden space-y-4">
        <select id="a-comp-sel" class="w-full bg-black/50 border border-white/10 rounded px-2 py-2 text-[11px] text-white focus:border-djMagenta focus:outline-none font-bold"><option value="NEW">✨ NUEVO HARDWARE</option></select>
        <div class="space-y-2"><input type="text" id="a-comp-t" placeholder="Nombre (ej: CDJ-3000)..." class="w-full bg-black/50 border border-white/10 rounded px-2 py-1.5 text-[11px] text-white focus:border-djMagenta focus:outline-none"><textarea id="a-comp-d" placeholder="Descripción técnica..." rows="3" class="w-full bg-black/50 border border-white/10 rounded px-2 py-1.5 text-[11px] text-white focus:border-djMagenta focus:outline-none resize-none"></textarea></div>
        <div class="bg-white/5 p-2 rounded-lg border border-white/10"><div class="flex justify-between items-center mb-2"><span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Polígonos</span><button id="btn-add-fig" class="text-[9px] bg-djMagenta/20 text-djMagenta px-2 py-1 rounded hover:bg-djMagenta hover:text-white transition-colors"><i class="fa-solid fa-plus mr-1"></i>Nuevo</button></div><ul id="a-comp-figs" class="space-y-1 mb-2"></ul><div id="draw-controls" class="hidden bg-djMagenta/10 border border-djMagenta/30 p-2 rounded mt-2"><div class="flex justify-between items-center mb-1"><span class="text-[9px] text-djMagenta font-bold animate-pulse"><i class="fa-solid fa-pen-nib mr-1"></i>Dibujando...</span><div class="flex gap-1"><button id="btn-cancel-fig" class="text-red-500 hover:bg-red-500/20 w-6 h-6 rounded flex items-center justify-center transition-colors text-[10px]"><i class="fa-solid fa-times"></i></button><button id="btn-close-fig" class="text-djCyan hover:bg-djCyan/20 w-6 h-6 rounded flex items-center justify-center transition-colors text-[10px]"><i class="fa-solid fa-check"></i></button></div></div><p id="admin-hint" class="text-[8px] text-gray-400 italic mb-2">Clic en imagen para añadir nodo. Arrastra puntos para mover.</p><ul id="a-comp-pts" class="space-y-1 max-h-24 overflow-y-auto pr-1"></ul></div></div>
        <div class="flex gap-2 pt-2"><button id="btn-dl-cp" class="flex-1 py-2 rounded bg-red-500/10 hover:bg-red-500/20 text-red-500 border border-red-500/30 text-[10px] font-bold uppercase transition-colors hidden"><i class="fa-solid fa-trash mr-1"></i>Borrar</button><button id="btn-sv-cp" class="flex-1 py-2 rounded bg-djMagenta hover:bg-fuchsia-400 text-black text-[10px] font-black uppercase transition-colors"><i class="fa-solid fa-save mr-1"></i>Guardar</button></div>
      </div>
      <div id="sec-a-mashups" class="hidden space-y-4">
        <select id="a-mash-sel" class="w-full bg-black/50 border border-white/10 rounded px-2 py-2 text-[11px] text-white focus:border-djYellow focus:outline-none font-bold"><option value="NEW">✨ NUEVO TRACK</option></select>
        <div class="space-y-2"><input type="text" id="a-mash-t" placeholder="Título del Mashup..." class="w-full bg-black/50 border border-white/10 rounded px-2 py-1.5 text-[11px] text-white focus:border-djYellow focus:outline-none"><input type="text" id="a-mash-dl" placeholder="URL Descarga (Drive/Mega)..." class="w-full bg-black/50 border border-white/10 rounded px-2 py-1.5 text-[11px] text-white focus:border-djYellow focus:outline-none"><textarea id="a-mash-sc" placeholder="URL SoundCloud..." rows="2" class="w-full bg-black/50 border border-white/10 rounded px-2 py-1.5 text-[11px] text-white focus:border-djYellow focus:outline-none resize-none font-mono text-[9px]"></textarea></div>
        <div class="flex gap-2 pt-2"><button id="btn-dl-ms" class="flex-1 py-2 rounded bg-red-500/10 hover:bg-red-500/20 text-red-500 border border-red-500/30 text-[10px] font-bold uppercase transition-colors hidden"><i class="fa-solid fa-trash mr-1"></i>Borrar</button><button id="btn-sv-ms" class="flex-1 py-2 rounded bg-djYellow hover:bg-yellow-400 text-black text-[10px] font-black uppercase transition-colors"><i class="fa-solid fa-upload mr-1"></i>Publicar</button></div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
