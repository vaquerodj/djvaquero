$('btn-reset-map').onclick=()=>{if(!svgW)return;const rW=vp.clientWidth,rH=vp.clientHeight;sc=Math.min(rW/svgW,rH/svgH)*0.95;pX=(rW-svgW*sc)/2;pY=(rH-svgH*sc)/2;if(!reqFr)reqFr=requestAnimationFrame(uTrans)};

fetch('salamanca.svg').then(r=>r.text()).then(h=>{
  tLay.innerHTML=h; const s=tLay.querySelector('svg'),g=crSvg('g'); try{const vb=s.viewBox.baseVal;if(vb.width){svgW=vb.width;svgH=vb.height}else{const b=s.getBBox();svgW=b.width;svgH=b.height}}catch(e){svgW=1000;svgH=1000}

});

const renderMap=()=>{const grp=currMuni?getGroup(currMuni):[];Object.entries(dbData.municipalities).forEach(([id,d])=>{const e=$(id);if(!e)return;const isSel=grp.includes(id);e.className.baseVal=`muni anim-trans muni-${d.status==='unlocked'?'unlocked':'base'} ${isSel?'muni-selected':''}`;if((d.status==='unlocked'||isSel)&&e.parentNode)e.parentNode.appendChild(e)})}, selMuni=id=>{currMuni=id;renderMap();const m=dbData.municipalities[id]||{},n=/^zona/i.test(m.name||id)?id.replace(/_/g,' '):(m.name||id.replace(/_/g,' '));iTit.innerText=n;$('a-muni-id').value=id;$('a-muni-name').value=n;clrEv();popEv(id);tog(iEmp,'hidden',true);tog(iEvs,'hidden',false);tog($('btn-close-tour'),'hidden',false);if(m.status==='unlocked'){$('a-muni-status').value='unlocked';iStat.innerHTML=`<div class="w-1.5 h-1.5 rounded-full bg-djCyan"></div><span class="text-djCyan text-[9px] font-bold uppercase">CONFIRMADO</span>`;let evHtml='';if(m.events){Object.entries(m.events).forEach(([eid,ev])=>{const hasMedia=ev.media||ev.embed;evHtml+=`<div class="bg-black/40 border border-white/5 rounded-xl p-3.5 relative"><div class="absolute top-0 left-0 w-1 h-full bg-djCyan rounded-l-xl"></div><h4 class="text-sm font-display font-black">${ev.place}</h4><p class="text-[10px] text-djCyan font-bold uppercase">${ev.date}</p>${ev.details?`<p class="text-[11px] text-gray-400 mt-0.5 leading-snug">${ev.details}</p>`:''}${hasMedia?`<button onclick="document.getElementById('media-${eid}').classList.toggle('hidden'); this.innerText = this.innerText === '+ INFO' ? '- INFO' : '+ INFO'" class="mt-2 px-2.5 py-1 bg-djCyan/10 text-djCyan hover:bg-djCyan/20 text-[9px] font-black rounded-full border border-djCyan/20 transition-all cursor-pointer w-fit">+ INFO</button><div id="media-${eid}" class="hidden mt-2 pt-2 border-t border-white/5 flex flex-col gap-2">`:''}${ev.media?ev.media.split(',').map(l=>(l=l.trim())?`<a href="${l}" target="_blank" class="inline-flex w-fit px-3 py-1 bg-white/5 hover:bg-white/10 text-white border-white/10 text-[9px] font-black tracking-wider rounded-full border anim-trans"><i class="fa-solid fa-link mr-1"></i>ENTRADAS</a>`:'').join(''):''}${ev.embed?`<div class="w-full rounded-lg overflow-hidden border border-white/10 text-xs">${ev.embed}</div>`:''}${hasMedia?`</div>`:''}</div>`})}else evHtml=`<p class="text-gray-500 text-[11px] text-center py-4">Próximamente.</p>`;iEvs.innerHTML=evHtml}else{$('a-muni-status').value='locked';iStat.innerHTML=`<div class="w-1.5 h-1.5 rounded-full bg-gray-600"></div><span class="text-gray-500 text-[9px] font-bold uppercase">ZONA LIBRE</span>`;iEvs.innerHTML=`<p class="text-gray-500 text-[11px] text-center py-4">Contrataciones abiertas.</p>`}iEvs.innerHTML+=`<a href="https://instagram.com/djvaquero__" target="_blank" class="block bg-gradient-to-r from-djCyan to-blue-500 text-black w-full py-2 rounded-xl text-center text-xs font-black mt-2 anim-trans hover:scale-[1.01] shadow-md">CONTRATACIÓN DIRECTA</a>`;mobScroll(iAnc)};
$('search-muni').oninput=e=>{const v=e.target.value.toLowerCase().trim(),rL=$('search-results');rL.innerHTML='';if(v.length<2)return tog(rL,'hidden',true);const grp={};Object.entries(dbData.municipalities).forEach(([id,d])=>{if(d?.name&&!/^zona/i.test(d.name)&&d.name.toLowerCase().includes(v))grp[d.name]=grp[d.name]||id});const m=Object.entries(grp).slice(0,5);tog(rL,'hidden',false);if(m.length)m.forEach(([n,id])=>{const li=document.createElement('li');li.className="px-4 py-2 hover:bg-white/5 text-xs cursor-pointer border-b border-white/5 font-medium anim-trans";li.innerHTML=`<i class="fa-solid fa-location-dot text-djCyan mr-2"></i>${n}`;li.onclick=()=>{selMuni(id);$('search-muni').value='';tog(rL,'hidden',true)};rL.appendChild(li)});else rL.innerHTML=`<li class="px-4 py-2 text-gray-500 text-xs italic">Sin resultados</li>`};
on(document,'click',e=>{if(!$('search-muni').contains(e.target))tog($('search-results'),'hidden',true)});

const renderMash=()=>{const g=$('mashups-grid'),e=Object.entries(dbData.mashups).sort();g.innerHTML=e.length?e.map(([_,d])=>`<div class="glass-panel p-3.5 flex flex-col justify-between bg-black/40 gap-3 rounded-xl border border-white/5"><div><h4 class="font-display font-black text-xs tracking-wide truncate mb-2 text-white"><i class="fa-solid fa-music text-djYellow mr-1.5"></i>${d.title}</h4></div>${d.scUrl?`<div class="w-full h-20 rounded-lg overflow-hidden border border-white/5"><iframe width="100%" height="100%" scrolling="no" frameborder="no" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(d.scUrl)}&color=%23f5d442&auto_play=false&hide_related=true&show_comments=false&show_teaser=false&visual=true"></iframe></div>`:''}${d.dl?`<a href="${d.dl}" target="_blank" class="bg-gradient-to-r from-djYellow to-orange-400 text-black py-2 rounded-xl text-center text-[11px] font-black anim-trans hover:scale-[1.01] block">DESCARGAR MASHUP</a>`:''}</div>`).join(''):'<p class="text-gray-500 text-xs p-2">Vacío</p>'};

window.selComp=id=>{$$('.comp-polygon').forEach(h=>h.classList.remove('hotspot-active'));$$(`.comp-id-${id}`).forEach(h=>h.classList.add('hotspot-active'));const c=dbData.components[id];if(!c)return;tog(sEmp,'hidden',true);tog(sInfC,'hidden',false);tog($('btn-close-setup'),'hidden',false);sStat.innerHTML=`<div class="w-1.5 h-1.5 rounded-full bg-djMagenta"></div><span class="text-djMagenta text-[9px] font-bold uppercase">ACTIVO</span>`;sTit.innerText=c.title;sDesc.innerText=c.desc};
const renderComp=()=>{const ov=$('setup-svg');ov.innerHTML='';if(actTab==='setup'&&!$('admin-panel').classList.contains('hidden'))return;Object.entries(dbData.components).forEach(([id,c])=>{(c.figures||[]).forEach(f=>{if(f.length>2){const p=crSvg("polygon");p.setAttribute("points",f.map(pt=>`${pt.x},${pt.y}`).join(' '));p.setAttribute("class",`comp-polygon anim-trans comp-id-${id}`);p.onclick=e=>{e.stopPropagation();selComp(id)};ov.appendChild(p)}})})};

const crDot=(pts,idx,pEl,dc)=>{const dt=document.createElement('div');dt.className="absolute w-2.5 h-2.5 bg-djMagenta rounded-full -translate-x-1/2 -translate-y-1/2 border border-white admin-drag-dot shadow-[0_0_6px_#e81cff]";dt.style.left=pts[idx].x+'%';dt.style.top=pts[idx].y+'%';on(dt,'contextmenu',e=>{e.preventDefault();e.stopPropagation();pts.splice(idx,1);renderAdminPts()});const mm=e=>{e.preventDefault();const r=$('setup-wrapper').getBoundingClientRect(),x=Math.max(0,Math.min(100,((e.clientX-r.left)/r.width)*100)),y=Math.max(0,Math.min(100,((e.clientY-r.top)/r.height)*100));dt.style.left=x+'%';dt.style.top=y+'%';pts[idx]={x:parseFloat(x.toFixed(1)),y:parseFloat(y.toFixed(1))};if(pEl)pEl.setAttribute("points",pts.map(p=>`${p.x},${p.y}`).join(' '))},mu=()=>{window.removeEventListener('pointermove',mm);window.removeEventListener('pointerup',mu)};on(dt,'pointerdown',e=>{e.stopPropagation();e.target.setPointerCapture(e.pointerId);on(window,'pointermove',mm);on(window,'pointerup',mu)});dc.appendChild(dt)};
const renderAdminPts=()=>{const figsUl=$('a-comp-figs'),ptsUl=$('a-comp-pts'),dc=$('admin-pts'),ov=$('setup-svg');dc.innerHTML='';ov.innerHTML='';figsUl.innerHTML=cFigs.map((f,i)=>{const isEd=editFigIdx===i;return `<li class="flex justify-between items-center bg-black/40 p-1.5 rounded border ${isEd?'border-djMagenta/60':'border-white/5'} text-[10px]"><span class="${isEd?'text-djMagenta':'text-white'}">Figura ${i+1} (${f.length} nodos)</span><div class="flex gap-2"><button class="text-djCyan" onclick="window.editFig(${i})"><i class="fa-solid fa-pen"></i></button><button class="text-red-500" onclick="window.delFig(${i})"><i class="fa-solid fa-trash"></i></button></div></li>`}).join('');cFigs.forEach((f,i)=>{const p=crSvg("polygon");p.setAttribute("points",f.map(pt=>`${pt.x},${pt.y}`).join(' '));p.setAttribute("fill","rgba(66,230,245,0.15)");p.setAttribute("stroke","#42e6f5");p.setAttribute("stroke-width","0.5");ov.appendChild(p);if(editFigIdx===i)f.forEach((_,ni)=>crDot(f,ni,p,dc))});if(cPts.length){const p=crSvg("polygon");p.setAttribute("points",cPts.map(pt=>`${pt.x},${pt.y}`).join(' '));p.setAttribute("fill","rgba(232,28,255,0.15)");p.setAttribute("stroke","#e81cff");p.setAttribute("stroke-width","0.5");p.setAttribute("stroke-dasharray","1");ov.appendChild(p);cPts.forEach((_,ni)=>crDot(cPts,ni,p,dc))}ptsUl.innerHTML=cPts.length?cPts.map((pt,i)=>`<li class="flex justify-between items-center bg-black/30 px-2 py-0.5 rounded text-[9px] text-gray-300"><span>Nodo ${i+1}: ${pt.x}%, ${pt.y}%</span><button class="text-red-500" onclick="window.delNode(${i})"><i class="fa-solid fa-xmark"></i></button></li>`).join(''):'<li class="text-[9px] text-gray-600 px-2 py-0.5">Sin nodos — clic izq añade</li>'};

window.editFig=i=>{if(editFigIdx===i){editFigIdx=-1;cPts=[]}else{editFigIdx=i;cPts=[...cFigs[i]];cFigs[i]=cPts}renderAdminPts()}; window.delFig=i=>{if(!confirm('¿Borrar figura?'))return;cFigs.splice(i,1);if(editFigIdx===i){editFigIdx=-1;cPts=[]}else if(editFigIdx>i)editFigIdx--;renderAdminPts()}; window.delNode=i=>{cPts.splice(i,1);renderAdminPts()};
$('btn-add-fig').onclick=()=>{if(cPts.length<3)return alert("Mínimo 3 nodos");if(editFigIdx<0)cFigs.push([...cPts]);editFigIdx=-1;cPts=[];renderAdminPts()}; $('btn-cl-pts').onclick=()=>{cPts=[];editFigIdx=-1;renderAdminPts()};

$('btn-sv-cp').onclick=()=>{if(!$('a-comp-t').value)return;const aF=[...cFigs];if(cPts.length>2)aF.push([...cPts]);set(ref(db,`components/${$('a-comp-sel').value==='NEW'?`comp_${Date.now()}`:$('a-comp-sel').value}`),{title:$('a-comp-t').value,desc:$('a-comp-d').value,figures:aF});cPts=[];editFigIdx=-1;renderAdminPts()};

$('btn-cl-ev').onclick=clrEv; $('btn-sv-ev').onclick=()=>{const id=$('a-muni-id').value,p=$('a-ev-p').value,eid=$('a-ev-id').value;if(!id)return;const u={},n=$('a-muni-name').value||id,s=$('a-muni-status').value,eI=eid||push(ref(db,`municipalities/${id}/events`)).key,pd=(p||eid)?{place:p,date:$('a-ev-d').value,details:$('a-ev-desc').value,media:$('a-ev-m').value,embed:$('a-ev-embed').value}:null;getGroup(id).forEach(g=>{u[`municipalities/${g}/status`]=s;u[`municipalities/${g}/name`]=n;if(pd)u[`municipalities/${g}/events/${eI}`]=pd});update(ref(db),u).then(()=>{clrEv();selMuni(id)})};

$('btn-dl-ms').onclick=()=>{if(confirm('¿Eliminar track?'))remove(ref(db,`mashups/${$('a-mash-sel').value}`)).then(()=>{$('a-mash-sel').value='NEW';$('a-mash-sel').dispatchEvent(new Event('change'))})};
