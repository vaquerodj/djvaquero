<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Título de la pestaña optimizado -->
    <title>DJ Vaquero</title>
    
    <!-- Icono de la pestaña (Favicon) usando tu Logo sin Fondo -->
    <link rel="icon" type="image/png" href="Logo - Logo sin Fondo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-cyan: #00e5ff;
            --neon-cyan-dim: rgba(0, 229, 255, 0.2);
            --neon-purple: #b052ff;
            --bg-surface: rgba(15, 15, 25, 0.55);
            --text-main: #ffffff;
            --text-muted: #8b95b1;
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.3); border-radius: 10px; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent !important; }

        body {
            margin: 0; padding: 0; color: var(--text-main); font-family: 'Outfit', system-ui, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
            background: linear-gradient(-45deg, #050508, #110d1a, #0a141b, #0d0914);
            background-size: 400% 400%; animation: gradientBG 20s ease infinite;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* HEADER Y SOCIALES */
        .social-header { display: flex; justify-content: center; gap: 20px; padding-top: 25px; animation: fadeInDown 1s ease forwards; opacity: 0; }
        .social-link {
            position: relative; display: flex; align-items: center; justify-content: center;
            width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            color: var(--text-muted); font-size: 1.3rem; text-decoration: none; overflow: hidden; backdrop-filter: blur(5px); transition: var(--transition-smooth);
        }
        .social-link::before { content: ''; position: absolute; top: 100%; left: 0; width: 100%; height: 100%; transition: var(--transition-smooth); z-index: 1; }
        .social-link i { position: relative; z-index: 2; transition: var(--transition-smooth); }
        .social-link:hover { transform: translateY(-5px); border-color: transparent; color: #fff; }
        .social-link.ig:hover::before { top: 0; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .social-link.tk:hover::before { top: 0; background: #000; }
        .social-link.sc:hover::before { top: 0; background: #ff5500; }
        .social-link.yt:hover::before { top: 0; background: #ff0000; }

        header { text-align: center; padding: 15px 20px 25px 20px; z-index: 10; flex-shrink: 0; }
        h1 { font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 900; margin: 15px 0 0 0; text-transform: uppercase; letter-spacing: 10px; background: linear-gradient(to bottom, #ffffff 0%, var(--neon-cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; animation: fadeInDown 1.2s ease forwards; opacity: 0; }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; letter-spacing: 8px; margin-top: 10px; text-transform: uppercase; font-weight: 600; animation: fadeInDown 1.4s ease forwards; opacity: 0; }

        .app-container { display: flex; flex-direction: row; width: 100%; max-width: 1700px; margin: 0 auto; padding: 0 20px 20px 20px; gap: 30px; flex: 1; overflow: hidden; }

        /* SECCIÓN MAPA - OPTIMIZADA ANTI-PARPADEO MÓVIL */
        .map-section {
            background: var(--bg-surface); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 24px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex: 2; position: relative; animation: slideInLeft 1s ease forwards; opacity: 0; box-shadow: 0 15px 30px rgba(0,0,0,0.4); 
            /* Fix definitivo aceleración GPU móvil */
            backface-visibility: hidden; -webkit-backface-visibility: hidden; transform: translate3d(0, 0, 0); -webkit-transform: translate3d(0, 0, 0);
        }

        .map-wrapper { width: 100%; height: 100%; cursor: grab; }
        .map-wrapper:active { cursor: grabbing; }
        
        svg { width: 100%; height: 100%; display: block; }
        
        /* ESTILOS DEL SVG MAPA */
        svg path, svg polygon { 
            fill: #0c0c14 !important; stroke: #2a2a3c !important; stroke-width: 0.8px !important; 
            transition: fill 0.2s ease, stroke 0.2s ease; 
        }
        
        @media (hover: hover) {
            svg [id]:not(#svg-pan-zoom_viewport):not([id=""]):hover path,
            svg [id]:not(#svg-pan-zoom_viewport):not([id=""]):hover polygon,
            svg path[id]:hover, svg polygon[id]:hover { 
                fill: #1d1d2e !important; stroke: var(--neon-cyan) !important; cursor: pointer; 
            }
        }
        
        svg .pinchado, svg .pinchado path, svg .pinchado polygon {
            fill: var(--neon-cyan) !important; stroke: #ffffff !important; stroke-width: 1.5px !important;
            animation: pulseColor 2.5s infinite alternate;
        }

        @keyframes pulseColor { 0% { fill: #00e5ff; } 100% { fill: #008eb3; } }

        .map-controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; background: rgba(5, 5, 10, 0.7); backdrop-filter: blur(10px); padding: 10px; border-radius: 16px; border: 1px solid var(--glass-border); z-index: 100; }
        .map-controls button { background: rgba(255, 255, 255, 0.05); color: #fff; border: none; width: 40px; height: 40px; border-radius: 10px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .map-controls button:active { background: var(--neon-cyan); color: #000; }

        /* SECCIÓN INFO / PANEL DERECHO */
        .info-section { background: linear-gradient(180deg, var(--bg-surface) 0%, rgba(5,5,10,0.8) 100%); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 0; display: flex; flex-direction: column; overflow: hidden; flex: 1; min-width: 350px; animation: slideInRight 1s ease forwards; opacity: 0; box-shadow: 0 15px 30px rgba(0,0,0,0.4); transform: translateZ(0); }
        
        /* NUEVA BIENVENIDA ARTÍSTICA OPTIMIZADA (WELCOME CARD) */
        .info-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 30px; text-align: center; }
        
        .dj-profile-card { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .brand-name-img { max-width: 80%; height: auto; margin-bottom: 25px; filter: drop-shadow(0 0 12px rgba(0, 229, 255, 0.25)); }
        
        .image-container { position: relative; display: inline-block; margin-bottom: 25px; }
        
        .profile-photo { 
            width: 180px; height: 180px; object-fit: cover; border-radius: 50%; 
            border: 2px solid var(--neon-cyan); box-shadow: 0 0 25px rgba(0, 229, 255, 0.35); 
            background-color: #000;
        }
        
        .profile-logo-badge { 
            position: absolute; bottom: 5px; right: 5px; width: 55px; height: 55px; 
            background: #06060b; border-radius: 50%; border: 2px solid var(--neon-cyan); 
            padding: 2px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); 
        }
        
        .profile-instruction { 
            font-size: 0.95rem; color: var(--text-muted); max-width: 290px; 
            line-height: 1.6; display: flex; align-items: center; justify-content: center; gap: 8px; margin: 0;
        }
        
        .pulse-dot { display: inline-block; width: 8px; height: 8px; background-color: var(--neon-cyan); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 10px var(--neon-cyan); } 100% { transform: scale(0.8); opacity: 0.5; } }

        /* DETALLES Y BLOQUEOS DE MUNICIPIOS */
        .locked-content { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px; text-align: center; }
        .locked-icon { font-size: 3.5rem; color: rgba(255,255,255,0.1); margin-bottom: 20px; animation: shake 3s infinite ease-in-out; }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 5%, 15% { transform: rotate(-10deg); } 10%, 20% { transform: rotate(10deg); } 25% { transform: rotate(0deg); } }

        .info-content { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .info-content.active, .locked-content.active { display: flex; animation: contentFadeIn 0.3s forwards; }
        @keyframes contentFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tabs-header { display: flex; border-bottom: 1px solid var(--glass-border); background: rgba(0,0,0,0.5); flex-shrink: 0; }
        .tab-btn { flex: 1; background: none; border: none; padding: 20px; color: var(--text-muted); font-size: 1rem; font-weight: 600; cursor: pointer; transition: var(--transition-smooth); text-transform: uppercase; letter-spacing: 3px; position: relative; }
        .tab-btn::after { content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); width: 0; height: 3px; background: var(--neon-cyan); transition: var(--transition-smooth); }
        .tab-btn.active { color: #fff; background: rgba(0, 229, 255, 0.05); }
        .tab-btn.active::after { width: 100%; box-shadow: 0 -2px 12px var(--neon-cyan); }
        .tab-body { padding: 35px; overflow-y: auto; flex: 1; display: none; }
        .tab-body.active { display: block; }

        .town-title { font-size: 2.8rem; color: #fff; margin: 0 0 8px 0; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
        .town-club { font-size: 1.15rem; color: var(--neon-cyan); margin-bottom: 35px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; display: inline-block; padding: 8px 16px; background: rgba(0, 229, 255, 0.1); border: 1px solid var(--neon-cyan-dim); border-radius: 10px; }
        .data-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .data-card h4 { color: var(--neon-purple); font-size: 0.9rem; text-transform: uppercase; margin: 0 0 12px 0; letter-spacing: 2px; font-weight: 800; }
        .data-card p { margin: 0; color: #e2e8f0; line-height: 1.8; font-size: 1.1rem; font-weight: 300; }
        .media-container { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .media-container iframe, .media-container blockquote { max-width: 100% !important; min-width: 250px !important; margin: 0 auto !important; border-radius: 16px; }

        /* DISPOSITIVOS MÓVILES */
        @media (max-width: 1023px) {
            body { overflow-y: auto; height: 100dvh; display: block; } 
            .app-container { flex: none; height: auto; flex-direction: column; padding: 0 15px 20px 15px; }
            .map-section { height: 50vh; min-height: 380px; }
            .info-section { height: auto; min-height: 50vh; }
            .town-title { font-size: 2.2rem; }
            .profile-photo { width: 140px; height: 140px; }
            .profile-logo-badge { width: 45px; height: 45px; }
            .brand-name-img { max-width: 75%; }
        }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

        /* MODAL ADMÍN */
        .admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 15px; }
        .admin-form { background: #0a0a0f; border: 1px solid var(--neon-purple); border-radius: 24px; width: 100%; max-width: 600px; padding: 35px; max-height: 90vh; overflow-y: auto; }
        .admin-form h2 { color: var(--neon-purple); border-bottom: 1px solid rgba(176, 82, 255, 0.3); padding-bottom: 15px; font-weight: 800; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: var(--text-muted); margin-bottom: 8px; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;}
        .input-group input, .input-group textarea { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px; border-radius: 12px; font-family: inherit; }
        .admin-actions { display: flex; gap: 15px; margin-top: 30px; }
        .btn-save { flex: 1; background: var(--neon-purple); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .admin-actions-secondary { display: flex; gap: 15px; margin-top: 15px; }
        .btn-name-only { flex: 2; background: rgba(0, 229, 255, 0.1); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer;}
        .btn-delete { flex: 1; background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; border-radius: 12px; padding: 14px; cursor: pointer; font-weight: bold;}
        .btn-cancel { background: transparent; color: var(--text-muted); border: none; padding: 15px; cursor: pointer; width: 100%; margin-top: 15px; text-transform: uppercase;}
    </style>
</head>
<body>

    <header>
        <div class="social-header">
            <a href="https://www.instagram.com/djvaquero__/" target="_blank" class="social-link ig"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@djvaquero__" target="_blank" class="social-link tk"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://soundcloud.com/djvaquero" target="_blank" class="social-link sc"><i class="fa-brands fa-soundcloud"></i></a>
            <a href="https://www.youtube.com/@vaquerodj" target="_blank" class="social-link yt"><i class="fa-brands fa-youtube"></i></a>
        </div>
        <h1 id="titulo-dj">DJ Vaquero</h1>
        <!-- Subtítulo modificado a SALAMANCA TOUR -->
        <div class="subtitle">SALAMANCA TOUR</div>
    </header>

    <div class="app-container">
        <!-- MAPA -->
        <div class="map-section" id="map-container">
            <div class="map-wrapper" id="map-holder">
                <!-- Se inyecta tu archivo salamanca.svg mediante JS -->
            </div>
            <div class="map-controls">
                <button onclick="if(mapPanZoom) mapPanZoom.zoomIn()"><i class="fa-solid fa-plus"></i></button>
                <button onclick="if(mapPanZoom) mapPanZoom.zoomOut()"><i class="fa-solid fa-minus"></i></button>
                <button onclick="if(mapPanZoom) { mapPanZoom.resetZoom(); mapPanZoom.center(); }"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
        </div>

        <!-- INFO / PANEL INTEGRADO CON TU IDENTIDAD -->
        <div class="info-section" id="scroll-target">
            
            <!-- Welcome Card Inicial Artística con tus archivos de imagen -->
            <div class="info-placeholder" id="info-placeholder">
                <div class="dj-profile-card">
                    <img src="Nombre - Nombre en Blanco.jpg" alt="DJ Vaquero Logo" class="brand-name-img">
                    <div class="image-container">
                        <img src="Foto 1.1.jpg" alt="DJ Vaquero Foto" class="profile-photo">
                        <img src="Logo - Logo sin Fondo.png" alt="DJ Vaquero Badge" class="profile-logo-badge">
                    </div>
                    <p class="profile-instruction">
                        <span class="pulse-dot"></span>
                        Selecciona un municipio para ver la sesión
                    </p>
                </div>
            </div>

            <!-- Municipio Bloqueado -->
            <div class="locked-content" id="info-locked">
                <div class="locked-icon"><i class="fa-solid fa-lock"></i></div>
                <h2 id="locked-title">Municipio</h2>
                <p>Este municipio aún no está desbloqueado. ¡Pronto anunciaremos nuevas fechas y confirmaciones!</p>
            </div>

            <!-- Municipio Activo con Datos de Firebase -->
            <div class="info-content" id="info-content">
                <div class="tabs-header">
                    <button class="tab-btn active" onclick="switchTab(event, 'info')">Información</button>
                    <button class="tab-btn" onclick="switchTab(event, 'media')">Directo</button>
                </div>
                <div class="tab-body active" id="tab-info">
                    <h2 class="town-title" id="ui-title">Municipio</h2>
                    <div class="town-club" id="ui-club">Sala</div>
                    <div class="data-card"><h4><i class="fa-solid fa-calendar-check"></i> Hito de la Sesión</h4><p id="ui-fechas">...</p></div>
                    <div class="data-card"><h4><i class="fa-solid fa-record-vinyl"></i> Reseña</h4><p id="ui-details">...</p></div>
                </div>
                <div class="tab-body" id="tab-media">
                    <div class="media-container" id="ui-media"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL ADMÍN -->
    <div class="admin-modal" id="admin-modal">
        <div class="admin-form">
            <h2>🎙️ Configurar: <span id="admin-town-name"></span></h2>
            <input type="hidden" id="admin-town-id">
            <div class="input-group"><label>Nombre del Municipio</label><input type="text" id="input-nombre"></div>
            <div class="input-group"><label>Sala / Discoteca</label><input type="text" id="input-sala"></div>
            <div class="input-group"><label>Hito</label><input type="text" id="input-fechas"></div>
            <div class="input-group"><label>Reseña</label><textarea id="input-details" rows="2"></textarea></div>
            <div class="input-group"><label>Embed TikTok/IG</label><textarea id="input-media" rows="4"></textarea></div>
            <div class="admin-actions"><button class="btn-save" onclick="guardarBolo()">Publicar</button></div>
            <div class="admin-actions-secondary">
                <button class="btn-name-only" onclick="guardarSoloNombre()">Solo Nombre</button>
                <button class="btn-delete" onclick="borrarBolo()">Apagar</button>
            </div>
            <button class="btn-cancel" onclick="cerrarAdmin()">Cancelar</button>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const firebaseConfig = {
                apiKey: "AIzaSyB5TFM9ZN-X1dvLdIGJX9quK_2jhq_8gqI",
                authDomain: "djvaquero-851e8.firebaseapp.com",
                projectId: "djvaquero-851e8",
                databaseURL: "https://djvaquero-851e8-default-rtdb.europe-west1.firebasedatabase.app"
            };

            let checkFirebase = setInterval(() => {
                if (window.firebase) {
                    clearInterval(checkFirebase);
                    initApp();
                }
            }, 50);

            function initApp() {
                firebase.initializeApp(firebaseConfig);
                window.database = firebase.database();

                database.ref('nombres').on('value', (snapshot) => { nombresGlobales = snapshot.val() || {}; });
                
                fetch('salamanca.svg')
                    .then(res => res.text())
                    .then(svgData => {
                        document.getElementById('map-holder').innerHTML = svgData;
                        
                        if (!mapPanZoom && window.svgPanZoom) inicializarZoom();

                        database.ref('bolos').on('value', (snapshot) => {
                            datosGlobales = snapshot.val() || {};
                            pintarPueblosActivos(); 
                        });
                    });
            }
        });

        let datosGlobales = {};
        let nombresGlobales = {};
        let modoAdmin = false;
        let mapPanZoom;

        // CAPTURA AVANZADA DE EVENTOS (PREVIENE ARRUSTRE VS CLICK)
        let isDraggingMap = false;
        let startX, startY;
        const mapHolder = document.getElementById('map-holder');

        mapHolder.addEventListener('pointerdown', (e) => {
            isDraggingMap = false;
            startX = e.clientX;
            startY = e.clientY;
        });

        mapHolder.addEventListener('pointermove', (e) => {
            if (startX !== undefined && startY !== undefined) {
                if (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10) {
                    isDraggingMap = true;
                }
            }
        });

        mapHolder.addEventListener('pointerup', (e) => {
            if (isDraggingMap) return;
            
            let target = e.target;
            let idOriginal = null;
            
            while (target && target !== mapHolder) {
                if (target.getAttribute) {
                    idOriginal = target.getAttribute('id') || target.getAttribute('name') || target.getAttribute('title');
                    if (idOriginal && idOriginal !== "svg-pan-zoom_viewport" && idOriginal !== "Desconocido" && target.tagName.toLowerCase() !== 'svg') {
                        break;
                    } else {
                        idOriginal = null;
                    }
                }
                target = target.parentNode;
            }

            if (idOriginal) {
                gestionarClickMunicipio(idOriginal);
            }
        });

        function pintarPueblosActivos() {
            const elementos = document.querySelectorAll('#map-holder svg [id], #map-holder svg [name]');
            elementos.forEach(el => {
                let id = el.getAttribute('id') || el.getAttribute('name');
                if (id && id !== "svg-pan-zoom_viewport" && id !== "Desconocido") {
                    if (datosGlobales[id]) { el.classList.add('pinchado'); } 
                    else { el.classList.remove('pinchado'); }
                }
            });
        }

        function inicializarZoom() {
            const svgElement = document.querySelector('#map-holder svg');
            mapPanZoom = svgPanZoom(svgElement, {
                zoomEnabled: true, controlIconsEnabled: false, fit: true, center: true,
                minZoom: 0.8, maxZoom: 15, zoomScaleSensitivity: 0.4, preventMouseEventsDefault: false 
            });
            window.addEventListener('resize', () => { if(mapPanZoom) { mapPanZoom.resize(); mapPanZoom.fit(); mapPanZoom.center(); } });
        }

        function getNombreMunicipio(idOriginal) { return nombresGlobales[idOriginal] || idOriginal.replace(/_/g, ' '); }

        function gestionarClickMunicipio(idOriginal) {
            if (modoAdmin) { abrirAdminForm(idOriginal, datosGlobales[idOriginal]); } 
            else { datosGlobales[idOriginal] ? mostrarInfoPublica(idOriginal, datosGlobales[idOriginal]) : mostrarInfoBloqueada(idOriginal); }
        }

        function scrollHaciaInfo() { if (window.innerWidth < 1024) { setTimeout(() => { document.getElementById('scroll-target').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 150); } }

        function ocultarTodosPaneles() {
            document.getElementById('info-placeholder').style.display = 'none';
            document.getElementById('info-content').classList.remove('active');
            document.getElementById('info-locked').classList.remove('active');
        }

        function mostrarInfoBloqueada(idOriginal) {
            ocultarTodosPaneles();
            document.getElementById('locked-title').innerText = getNombreMunicipio(idOriginal);
            document.getElementById('info-locked').classList.add('active');
            scrollHaciaInfo();
        }

        function mostrarInfoPublica(idOriginal, datos) {
            ocultarTodosPaneles();
            document.getElementById('info-content').classList.add('active');
            document.getElementById('ui-title').innerText = datos.nombrePersonalizado || getNombreMunicipio(idOriginal);
            document.getElementById('ui-club').innerText = datos.sala || 'Sala sin especificar';
            document.getElementById('ui-fechas').innerText = datos.fechas || 'Dato no registrado.';
            document.getElementById('ui-details').innerText = datos.detalles || 'Sin reseña.';
            
            let mediaBox = document.getElementById('ui-media');
            if(datos.media && datos.media.trim() !== "") {
                mediaBox.innerHTML = datos.media;
                inyectarScriptsMediaLazy();
            } else {
                mediaBox.innerHTML = '<div style="color:#8b95b1;text-align:center;padding:20px;">Sin vídeo disponible.</div>';
            }
            document.querySelector('.tab-btn').click(); scrollHaciaInfo();
        }

        function inyectarScriptsMediaLazy() {
            let mediaBox = document.getElementById('ui-media');
            Array.from(mediaBox.querySelectorAll('script')).forEach(oldScript => {
                let newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                if (oldScript.innerHTML) newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
            if (!document.getElementById('tiktok-sdk')) { let tk = document.createElement('script'); tk.id = 'tiktok-sdk'; tk.async = true; tk.src = "https://www.tiktok.com/embed.js"; document.body.appendChild(tk); } else if (window.tiktokEmbed) { window.tiktokEmbed.load(); }
            if (!document.getElementById('ig-sdk')) { let ig = document.createElement('script'); ig.id = 'ig-sdk'; ig.async = true; ig.src = "//www.instagram.com/embed.js"; document.body.appendChild(ig); } else if (window.instgrm) { window.instgrm.Embeds.process(); }
        }

        function switchTab(evt, tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-body').forEach(b => b.classList.remove('active'));
            evt.target.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        let toques = 0; let timer;
        document.getElementById('titulo-dj').addEventListener('click', () => {
            toques++; clearTimeout(timer);
            if (toques === 3) { if (prompt("PIN ESTUDIO:") === "1524") { modoAdmin = true; alert("✅ ADMIN ACTIVADO"); } toques = 0; } 
            else { timer = setTimeout(() => toques = 0, 1500); }
        });

        function abrirAdminForm(idOriginal, datosExistentes) {
            document.getElementById('admin-modal').style.display = 'flex';
            document.getElementById('admin-town-id').value = idOriginal;
            document.getElementById('admin-town-name').innerText = getNombreMunicipio(idOriginal);
            document.getElementById('input-nombre').value = datosExistentes ? (datosExistentes.nombrePersonalizado || getNombreMunicipio(idOriginal)) : getNombreMunicipio(idOriginal);
            document.getElementById('input-sala').value = datosExistentes ? (datosExistentes.sala || '') : '';
            document.getElementById('input-fechas').value = datosExistentes ? (datosExistentes.fechas || '') : '';
            document.getElementById('input-details').value = datosExistentes ? (datosExistentes.detalles || '') : '';
            document.getElementById('input-media').value = datosExistentes ? (datosExistentes.media || '') : '';
        }
        function cerrarAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        function guardarSoloNombre() { database.ref('nombres/' + document.getElementById('admin-town-id').value).set(document.getElementById('input-nombre').value).then(() => cerrarAdmin()); }
        function guardarBolo() {
            let id = document.getElementById('admin-town-id').value; let nombre = document.getElementById('input-nombre').value;
            database.ref('nombres/' + id).set(nombre);
            database.ref('bolos/' + id).set({ nombrePersonalizado: nombre, sala: document.getElementById('input-sala').value, fechas: document.getElementById('input-fechas').value, detalles: document.getElementById('input-details').value, media: document.getElementById('input-media').value }).then(() => cerrarAdmin());
        }
        function borrarBolo() { if(confirm("¿Eliminar datos del municipio?")) { database.ref('bolos/' + document.getElementById('admin-town-id').value).remove().then(() => cerrarAdmin()); } }
    </script>
</body>
</html>
