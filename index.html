<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ VAQUERO | Official Site</title>
    <link rel="icon" href="logo.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Estilos personalizados y tema oscuro */
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
        }
        body {
            background-color: #0f0f13; /* Fondo oscuro DJ */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(25, 25, 30, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        .neon-text {
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-purple);
        }
        .svg-container {
            width: 100%;
            height: 60vh;
            overflow: auto;
            border-radius: 12px;
            touch-action: pan-x pan-y; /* Permite scroll táctil */
            position: relative;
        }
        object {
            width: 100%;
            min-width: 800px; /* Para asegurar que el zoom funcione al hacer scroll */
            transition: transform 0.3s ease;
            transform-origin: 0 0;
        }
        /* Ocultar barra de scroll para estética */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a24; }
        ::-webkit-scrollbar-thumb { background: #bc13fe; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="glass-panel sticky top-0 z-50 m-4 p-4 flex flex-col md:flex-row justify-between items-center">
        <h1 id="site-title" class="text-3xl font-black tracking-widest neon-text cursor-pointer mb-4 md:mb-0">
            DJ VAQUERO
        </h1>
        
        <div class="flex space-x-6 text-xl">
            <a href="https://www.instagram.com/djvaquero__/" target="_blank" class="hover:text-[#E1306C] transition-colors"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@djvaquero__" target="_blank" class="hover:text-[#69C9D0] transition-colors"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://soundcloud.com/djvaquero" target="_blank" class="hover:text-[#ff5500] transition-colors"><i class="fa-brands fa-soundcloud"></i></a>
            <a href="https://www.youtube.com/@vaquerodj" target="_blank" class="hover:text-[#FF0000] transition-colors"><i class="fa-brands fa-youtube"></i></a>
        </div>
    </header>

    <nav class="flex justify-center space-x-4 mb-6 px-4">
        <button id="btn-tour" class="px-6 py-2 rounded-full font-bold bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg transition-transform hover:scale-105">SALAMANCA TOUR</button>
        <button id="btn-setup" class="px-6 py-2 rounded-full font-bold glass-panel hover:bg-gray-700 transition-colors">SETUP</button>
    </nav>

    <main id="sec-tour" class="flex-grow flex flex-col px-4 md:px-10 pb-10 w-full max-w-7xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between mb-4 gap-4">
            <div class="relative w-full md:w-1/3">
                <input type="text" id="search-muni" placeholder="Buscar municipio..." class="w-full glass-panel px-4 py-2 text-white focus:outline-none focus:border-purple-500">
                <i class="fa-solid fa-magnifying-glass absolute right-4 top-3 text-gray-400"></i>
            </div>
            <div class="flex space-x-2">
                <button id="zoom-in-tour" class="glass-panel px-4 py-2 hover:bg-gray-700"><i class="fa-solid fa-plus"></i></button>
                <button id="zoom-out-tour" class="glass-panel px-4 py-2 hover:bg-gray-700"><i class="fa-solid fa-minus"></i></button>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-6">
            <div class="svg-container glass-panel lg:w-2/3" id="map-wrapper">
                <object id="map-svg" data="salamanca.svg" type="image/svg+xml"></object>
            </div>

            <div class="glass-panel p-6 lg:w-1/3 flex flex-col h-fit">
                <h2 id="info-title" class="text-2xl font-bold mb-2 text-purple-400">Selecciona un municipio</h2>
                <div id="info-status" class="mb-4">
                    <span class="px-2 py-1 bg-gray-700 text-xs rounded uppercase tracking-wider text-gray-300">Esperando selección</span>
                </div>
                <div id="info-content" class="text-gray-300 hidden">
                    <p class="mb-2"><i class="fa-solid fa-location-dot mr-2"></i><strong class="text-white">Lugar:</strong> <span id="info-place"></span></p>
                    <p class="mb-2"><i class="fa-solid fa-calendar mr-2"></i><strong class="text-white">Fecha:</strong> <span id="info-date"></span></p>
                    <p class="mb-4"><i class="fa-solid fa-circle-info mr-2"></i><strong class="text-white">Detalles:</strong> <span id="info-details"></span></p>
                    
                    <h3 class="text-xl font-bold mt-4 mb-2 border-b border-gray-600 pb-1">MEDIA <i class="fa-brands fa-tiktok text-sm"></i></h3>
                    <div id="info-media" class="flex flex-col gap-2">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <main id="sec-setup" class="hidden flex-grow flex flex-col px-4 md:px-10 pb-10 w-full max-w-7xl mx-auto">
        <div class="flex justify-end mb-4">
            <div class="flex space-x-2">
                <button id="zoom-in-setup" class="glass-panel px-4 py-2 hover:bg-gray-700"><i class="fa-solid fa-plus"></i></button>
                <button id="zoom-out-setup" class="glass-panel px-4 py-2 hover:bg-gray-700"><i class="fa-solid fa-minus"></i></button>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-6">
            <div class="svg-container glass-panel lg:w-2/3" id="setup-wrapper">
                <object id="setup-svg" data="setup.svg" type="image/svg+xml"></object>
            </div>
            
            <div class="glass-panel p-6 lg:w-1/3 flex flex-col h-fit">
                <h2 id="setup-title" class="text-2xl font-bold mb-2 text-blue-400">Selecciona un componente</h2>
                <div id="setup-content" class="text-gray-300 mt-4">
                    <p id="setup-specs">Haz clic en altavoces, mesa, etc. para ver especificaciones.</p>
                </div>
            </div>
        </div>
    </main>

    <div id="admin-panel" class="hidden fixed inset-0 bg-black bg-opacity-90 z-[100] flex justify-center items-center p-4 overflow-y-auto">
        <div class="glass-panel p-6 w-full max-w-2xl bg-gray-900 border-red-500 border-2">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-red-500"><i class="fa-solid fa-lock-open"></i> MODO ADMIN</h2>
                <button id="btn-close-admin" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <h3 class="font-bold text-purple-400 mb-2">Editar Municipio</h3>
                    <input type="text" id="admin-muni-id" placeholder="ID/Nombre del Municipio" class="w-full p-2 mb-2 bg-gray-800 rounded">
                    <select id="admin-muni-status" class="w-full p-2 mb-2 bg-gray-800 rounded">
                        <option value="locked">Bloqueado</option>
                        <option value="unlocked">Desbloqueado</option>
                    </select>
                    <input type="text" id="admin-muni-place" placeholder="Lugar del evento" class="w-full p-2 mb-2 bg-gray-800 rounded">
                    <input type="date" id="admin-muni-date" class="w-full p-2 mb-2 bg-gray-800 rounded text-gray-400">
                    <textarea id="admin-muni-details" placeholder="Detalles extra" class="w-full p-2 mb-2 bg-gray-800 rounded"></textarea>
                    <input type="text" id="admin-muni-media" placeholder="URL TikTok/Reel (separado por comas)" class="w-full p-2 mb-4 bg-gray-800 rounded">
                    <button id="btn-save-muni" class="w-full bg-purple-600 hover:bg-purple-700 p-2 rounded font-bold">Guardar Municipio</button>
                </div>

                <div>
                    <h3 class="font-bold text-blue-400 mb-2">Editar Componente Setup</h3>
                    <input type="text" id="admin-setup-id" placeholder="ID/Nombre Componente" class="w-full p-2 mb-2 bg-gray-800 rounded">
                    <input type="text" id="admin-setup-name" placeholder="Nombre a mostrar" class="w-full p-2 mb-2 bg-gray-800 rounded">
                    <textarea id="admin-setup-specs" placeholder="Especificaciones" class="w-full p-2 mb-4 bg-gray-800 rounded h-32"></textarea>
                    <button id="btn-save-setup" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded font-bold">Guardar Componente</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. IMPORTAR FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5TFM9ZN-X1dvLdIGJX9quK_2jhq_8gqI",
            authDomain: "djvaquero-851e8.firebaseapp.com",
            databaseURL: "https://djvaquero-851e8-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "djvaquero-851e8",
            storageBucket: "djvaquero-851e8.firebasestorage.app",
            messagingSenderId: "943264468873",
            appId: "1:943264468873:web:30725455620a5f737bdb58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Variables de Estado Local
        let dbData = { municipalities: {}, setup: {} };
        let currentSection = 'tour'; // 'tour' o 'setup'
        let tourZoom = 1;
        let setupZoom = 1;

        // 2. OBTENER DATOS DE FIREBASE EN TIEMPO REAL
        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                if(data.municipalities) dbData.municipalities = data.municipalities;
                if(data.setup) dbData.setup = data.setup;
                
                // Actualizar UI si se hacen cambios desde admin
                colorearMapa();
            }
        });

        // 3. NAVEGACIÓN TABS
        const btnTour = document.getElementById('btn-tour');
        const btnSetup = document.getElementById('btn-setup');
        const secTour = document.getElementById('sec-tour');
        const secSetup = document.getElementById('sec-setup');

        btnTour.addEventListener('click', () => {
            secTour.classList.remove('hidden');
            secSetup.classList.add('hidden');
            btnTour.className = "px-6 py-2 rounded-full font-bold bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg transition-transform hover:scale-105";
            btnSetup.className = "px-6 py-2 rounded-full font-bold glass-panel hover:bg-gray-700 transition-colors";
        });

        btnSetup.addEventListener('click', () => {
            secSetup.classList.remove('hidden');
            secTour.classList.add('hidden');
            btnSetup.className = "px-6 py-2 rounded-full font-bold bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg transition-transform hover:scale-105";
            btnTour.className = "px-6 py-2 rounded-full font-bold glass-panel hover:bg-gray-700 transition-colors";
        });

        // 4. LÓGICA DE MAPAS Y SVG
        // Función para aplicar zoom
        function applyZoom(objId, scale) {
            const obj = document.getElementById(objId);
            obj.style.transform = `scale(${scale})`;
        }

        document.getElementById('zoom-in-tour').onclick = () => { tourZoom += 0.2; applyZoom('map-svg', tourZoom); };
        document.getElementById('zoom-out-tour').onclick = () => { tourZoom = Math.max(0.5, tourZoom - 0.2); applyZoom('map-svg', tourZoom); };
        
        document.getElementById('zoom-in-setup').onclick = () => { setupZoom += 0.2; applyZoom('setup-svg', setupZoom); };
        document.getElementById('zoom-out-setup').onclick = () => { setupZoom = Math.max(0.5, setupZoom - 0.2); applyZoom('setup-svg', setupZoom); };

        // Interacción con SVG (Detectar clics en los SVG)
        function initSVGInteraction(svgObjId, isTour) {
            const obj = document.getElementById(svgObjId);
            obj.addEventListener('load', () => {
                const svgDoc = obj.contentDocument;
                if(!svgDoc) return; // Protegido por CORS si no está en servidor
                
                // Se asume que todos los paths o grupos que importan tienen ID
                const elements = svgDoc.querySelectorAll('[id]');
                elements.forEach(el => {
                    // Estilo de cursor
                    el.style.cursor = 'pointer';
                    el.addEventListener('click', (e) => {
                        const id = el.getAttribute('id');
                        if(isTour) loadMuniInfo(id);
                        else loadSetupInfo(id);
                    });
                });
                if(isTour) colorearMapa(); // Colorear al inicio
            });
        }
        initSVGInteraction('map-svg', true);
        initSVGInteraction('setup-svg', false);

        // 5. CARGAR INFORMACIÓN UI
        function loadMuniInfo(id) {
            const muni = dbData.municipalities[id];
            document.getElementById('info-title').innerText = id.replace(/_/g, ' '); // Remplazar guiones bajos por espacios
            
            const statusDiv = document.getElementById('info-status');
            const contentDiv = document.getElementById('info-content');

            if (muni && muni.status === 'unlocked') {
                statusDiv.innerHTML = '<span class="px-2 py-1 bg-green-600 text-white text-xs rounded uppercase tracking-wider">¡Desbloqueado!</span>';
                contentDiv.classList.remove('hidden');
                
                document.getElementById('info-place').innerText = muni.place || 'N/A';
                document.getElementById('info-date').innerText = muni.date || 'N/A';
                document.getElementById('info-details').innerText = muni.details || 'Sin detalles.';
                
                // Cargar Media
                const mediaContainer = document.getElementById('info-media');
                mediaContainer.innerHTML = '';
                if(muni.media) {
                    const links = muni.media.split(',');
                    links.forEach(link => {
                        if(link.trim() !== '') {
                            mediaContainer.innerHTML += `<a href="${link.trim()}" target="_blank" class="text-blue-400 hover:text-blue-300 underline text-sm truncate"><i class="fa-solid fa-link"></i> Ver contenido multimedia</a>`;
                        }
                    });
                }
            } else {
                statusDiv.innerHTML = '<span class="px-2 py-1 bg-red-600 text-white text-xs rounded uppercase tracking-wider"><i class="fa-solid fa-lock"></i> Bloqueado</span>';
                contentDiv.classList.add('hidden');
            }

            // Auto-rellenar Admin si está abierto
            document.getElementById('admin-muni-id').value = id;
            if(muni) {
                document.getElementById('admin-muni-status').value = muni.status || 'locked';
                document.getElementById('admin-muni-place').value = muni.place || '';
                document.getElementById('admin-muni-date').value = muni.date || '';
                document.getElementById('admin-muni-details').value = muni.details || '';
                document.getElementById('admin-muni-media').value = muni.media || '';
            } else {
                document.getElementById('admin-muni-status').value = 'locked';
                document.getElementById('admin-muni-place').value = '';
                document.getElementById('admin-muni-date').value = '';
                document.getElementById('admin-muni-details').value = '';
                document.getElementById('admin-muni-media').value = '';
            }
        }

        function loadSetupInfo(id) {
            const comp = dbData.setup[id];
            document.getElementById('setup-title').innerText = comp ? comp.name : id.replace(/_/g, ' ');
            document.getElementById('setup-specs').innerText = comp ? comp.specs : 'Especificaciones no disponibles. (Bloqueado/No configurado)';
            
            // Auto-rellenar Admin
            document.getElementById('admin-setup-id').value = id;
            document.getElementById('admin-setup-name').value = comp ? comp.name : '';
            document.getElementById('admin-setup-specs').value = comp ? comp.specs : '';
        }

        function colorearMapa() {
            const obj = document.getElementById('map-svg');
            const svgDoc = obj.contentDocument;
            if(!svgDoc) return;

            // Recorrer los ids en la BBDD
            for (const [id, data] of Object.entries(dbData.municipalities)) {
                const element = svgDoc.getElementById(id);
                if(element) {
                    if(data.status === 'unlocked') {
                        element.style.fill = '#bc13fe'; // Neon Purple para desbloqueados
                        element.style.opacity = '0.8';
                    } else {
                        element.style.fill = '#333344'; // Oscuro bloqueado
                    }
                }
            }
        }

        // Buscador de Municipios
        document.getElementById('search-muni').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if(val.length > 2) {
                // Lógica simple: Si coincide con ID, cargar
                const obj = document.getElementById('map-svg').contentDocument;
                if(obj) {
                    const elements = obj.querySelectorAll('[id]');
                    elements.forEach(el => {
                        if(el.id.toLowerCase().includes(val)) {
                            // Cargar el primero que coincida
                            loadMuniInfo(el.id);
                            // Resaltar visualmente (opcional)
                            el.style.stroke = "white";
                            el.style.strokeWidth = "3px";
                            setTimeout(() => el.style.stroke = "none", 2000);
                        }
                    });
                }
            }
        });

        // 6. MODO ADMINISTRADOR (Contraseña 1524, triple clic)
        let clickCount = 0;
        let clickTimer;
        
        document.getElementById('site-title').addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 1000); // Reset tras 1 segundo
            
            if(clickCount >= 3) {
                clickCount = 0;
                let password = prompt("Introduce contraseña de administrador:");
                if(password === "1524") {
                    document.getElementById('admin-panel').classList.remove('hidden');
                } else if (password !== null) {
                    alert("Contraseña incorrecta.");
                }
            }
        });

        document.getElementById('btn-close-admin').onclick = () => {
            document.getElementById('admin-panel').classList.add('hidden');
        };

        // Guardar Datos en Firebase
        document.getElementById('btn-save-muni').addEventListener('click', () => {
            const id = document.getElementById('admin-muni-id').value;
            if(!id) return alert("Introduce un ID de municipio.");
            
            const data = {
                status: document.getElementById('admin-muni-status').value,
                place: document.getElementById('admin-muni-place').value,
                date: document.getElementById('admin-muni-date').value,
                details: document.getElementById('admin-muni-details').value,
                media: document.getElementById('admin-muni-media').value
            };

            set(ref(db, 'municipalities/' + id), data)
                .then(() => alert('Municipio guardado!'))
                .catch((err) => alert('Error: ' + err));
        });

        document.getElementById('btn-save-setup').addEventListener('click', () => {
            const id = document.getElementById('admin-setup-id').value;
            if(!id) return alert("Introduce un ID de componente.");
            
            const data = {
                name: document.getElementById('admin-setup-name').value,
                specs: document.getElementById('admin-setup-specs').value
            };

            set(ref(db, 'setup/' + id), data)
                .then(() => alert('Componente guardado!'))
                .catch((err) => alert('Error: ' + err));
        });

    </script>
</body>
</html>
