<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#030408">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DJ VAQUERO | Web Oficial</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdn.tailwindcss.com"></script>
<script src="tailwind-config.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="antialiased selection:bg-djCyan selection:text-black text-gray-200">
<div class="ambient-bg"><div class="ambient-glow glow-1"></div><div class="ambient-glow glow-2"></div></div>

<header class="w-full px-4 py-2 z-50 flex justify-between items-center relative shrink-0 animate-fade-in">
  <div id="site-title" class="cursor-pointer select-none active:scale-95 transition-transform flex items-center gap-2 group">
    <h1 class="font-display font-black text-2xl md:text-3xl tracking-tighter text-white uppercase drop-shadow-2xl">
      DJ <span class="text-djCyan drop-shadow-[0_0_15px_rgba(0,229,255,0.6)] group-hover:text-white transition-colors duration-300">VAQUERO</span>
    </h1>
  </div>
  <div class="flex gap-2 md:gap-3">
    <a href="https://instagram.com/djvaquero__" target="_blank" aria-label="Instagram" class="social-icon social-ig"><i class="fa-brands fa-instagram text-lg"></i></a>
    <a href="https://tiktok.com/@djvaquero__" target="_blank" aria-label="TikTok" class="social-icon social-tk"><i class="fa-brands fa-tiktok text-lg"></i></a>
    <a href="https://www.youtube.com/@vaquerodj" target="_blank" aria-label="YouTube" class="social-icon social-yt"><i class="fa-brands fa-youtube text-lg"></i></a>
    <a href="https://soundcloud.com/djvaquero" target="_blank" aria-label="SoundCloud" class="social-icon social-sc hidden sm:flex"><i class="fa-brands fa-soundcloud text-lg"></i></a>
  </div>
</header>

<main class="w-full flex-grow flex flex-col md:flex-row gap-2 md:gap-4 relative z-10 overflow-hidden pb-1 md:pb-0 animate-slide-up">
  
  <nav class="glass-card flex md:flex-col justify-around md:justify-center gap-2 md:gap-8 p-3 md:w-24 shrink-0 order-2 md:order-1 z-50 mb-2 md:mb-0 shadow-2xl backdrop-blur-2xl">
    <button id="btn-nav-tour" onclick="window.switchView('tour')" class="nav-btn nav-active group w-full py-2">
      <div class="w-12 h-12 rounded-2xl bg-djCyan/20 text-djCyan flex items-center justify-center transition-all duration-300 shadow-[0_0_15px_rgba(0,229,255,0.2)] group-hover:shadow-[0_0_20px_rgba(0,229,255,0.4)] group-active:scale-90"><i class="fa-solid fa-map-location-dot text-xl"></i></div>
      <span class="text-[10px] md:text-xs font-bold uppercase tracking-widest mt-2">Tour</span>
    </button>
    <button id="btn-nav-setup" onclick="window.switchView('setup')" class="nav-btn group w-full py-2">
      <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center group-hover:bg-djMagenta/20 group-hover:text-djMagenta transition-all duration-300 group-active:scale-90"><i class="fa-solid fa-sliders text-xl"></i></div>
      <span class="text-[10px] md:text-xs font-bold uppercase tracking-widest mt-2">Equipo</span>
    </button>
    <button id="btn-nav-mashups" onclick="window.switchView('mashups')" class="nav-btn group w-full py-2">
      <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center group-hover:bg-djYellow/20 group-hover:text-djYellow transition-all duration-300 group-active:scale-90"><i class="fa-solid fa-compact-disc text-xl"></i></div>
      <span class="text-[10px] md:text-xs font-bold uppercase tracking-widest mt-2">Mashups</span>
    </button>
  </nav>

  <div class="glass-card flex-grow w-full h-full relative overflow-hidden order-1 md:order-2 shadow-2xl backdrop-blur-2xl">
    
    <div id="view-tour" class="app-view active">
      <div class="absolute top-4 left-4 z-30 flex items-center gap-3 pointer-events-auto w-[calc(100%-2rem)] md:w-96">
        <div class="relative flex-grow group">
          <input type="text" id="search-muni" autocomplete="off" placeholder="Buscar zona..." class="w-full bg-black/70 backdrop-blur-md border border-white/10 pl-10 pr-4 py-3 text-sm rounded-2xl text-white outline-none focus:border-djCyan focus:ring-1 focus:ring-djCyan transition-all shadow-xl">
          <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-djCyan transition-colors"></i>
          <ul id="search-results" class="absolute top-full left-0 w-full mt-2 bg-black/95 backdrop-blur-xl border border-white/10 rounded-2xl hidden max-h-56 overflow-y-auto custom-scrollbar z-50 shadow-2xl divide-y divide-white/5"></ul>
        </div>
        <button id="btn-reset-map" aria-label="Centrar mapa" class="bg-black/70 backdrop-blur-md border border-white/10 hover:border-djCyan hover:text-djCyan w-12 h-12 rounded-2xl flex items-center justify-center text-gray-400 shrink-0 transition-all shadow-xl active:scale-95"><i class="fa-solid fa-expand text-sm"></i></button>
      </div>
      <div class="w-full h-full bg-[#030407] relative cursor-grab overflow-hidden rounded-2xl active:cursor-grabbing" id="tour-viewport">
        <div class="zoom-layer" id="tour-layer"></div>
      </div>
      <div id="info-overlay" class="slide-panel rounded-r-none rounded-l-3xl md:rounded-l-2xl">
        <div class="p-5 border-b border-white/5 bg-gradient-to-b from-white/5 to-transparent flex justify-between items-start">
          <div>
            <h3 id="info-title" class="text-xl font-display font-black text-white uppercase tracking-tighter mb-1">ZONA</h3>
            <div id="info-status" class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-gray-600"></div><span class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Selecciona en el mapa</span></div>
          </div>
          <button id="btn-close-tour" class="w-8 h-8 rounded-xl bg-white/5 hover:bg-white/20 hover:text-white text-gray-400 flex items-center justify-center transition-colors"><i class="fa-solid fa-times"></i></button>
        </div>
        <div id="info-events" class="flex-grow flex flex-col gap-4 p-5 overflow-y-auto custom-scrollbar"></div>
      </div>
    </div>

    <div id="view-setup" class="app-view bg-[#030407]">
      <div class="absolute top-6 left-6 z-30 pointer-events-none">
        <h2 class="font-display font-black text-djMagenta text-2xl uppercase tracking-widest drop-shadow-[0_0_15px_rgba(255,0,234,0.4)]">
          <i class="fa-solid fa-headphones mr-3 text-djMagenta"></i> Cabina DJ
        </h2>
      </div>
      <div class="w-full h-full flex justify-center items-center p-4 relative">
        <div id="setup-wrapper" class="relative max-w-full max-h-full inline-block select-none touch-none rounded-2xl">
          <img src="setup.png" alt="Setup" loading="lazy" class="w-auto h-auto max-w-full max-h-[80vh] object-contain drop-shadow-2xl transition-opacity duration-300" id="setup-img" draggable="false">
          <svg id="setup-svg" viewBox="0 0 100 100" preserveAspectRatio="none" class="absolute inset-0 w-full h-full pointer-events-none z-20"></svg>
          <div id="admin-pts" class="absolute inset-0 pointer-events-none z-40 hidden"></div>
        </div>
      </div>
      <p id="admin-hint" class="absolute bottom-4 left-4 text-djMagenta text-[10px] hidden font-bold bg-black/95 px-3 py-1.5 rounded-xl border border-djMagenta/40 z-50 shadow-[0_0_20px_rgba(255,0,234,0.3)] animate-pulse"><i class="fa-solid fa-wrench mr-2"></i> EDICIÓN DE NODOS ACTIVADA</p>
      <div id="setup-overlay" class="slide-panel rounded-r-none rounded-l-3xl md:rounded-l-2xl">
        <div class="p-5 border-b border-white/5 bg-gradient-to-b from-white/5 to-transparent flex justify-between items-start">
          <div>
            <div id="setup-status" class="flex items-center gap-2 mb-1"><div class="w-2 h-2 rounded-full bg-gray-600"></div><span class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Hardware</span></div>
            <h3 id="setup-t" class="text-lg font-display font-black text-white uppercase tracking-tighter"></h3>
          </div>
          <button id="btn-close-setup" class="w-8 h-8 rounded-xl bg-white/5 hover:bg-white/20 hover:text-white text-gray-400 flex items-center justify-center transition-colors"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="flex-grow p-5 overflow-y-auto custom-scrollbar">
          <p id="setup-d" class="text-gray-300 text-sm leading-relaxed whitespace-pre-wrap"></p>
        </div>
      </div>
    </div>

    <div id="view-mashups" class="app-view bg-[#030407]">
      <div class="p-5 border-b border-white/5 bg-gradient-to-b from-white/5 to-transparent shrink-0">
        <h2 class="font-display font-black text-djYellow text-2xl uppercase tracking-widest drop-shadow-[0_0_15px_rgba(255,214,0,0.4)]">
          <i class="fa-solid fa-compact-disc mr-3 text-djYellow animate-spin" style="animation-duration: 3s;"></i> Tracks Exclusivos
        </h2>
      </div>
      <div id="mashups-grid" class="flex-grow p-5 overflow-y-auto custom-scrollbar grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 content-start"></div>
    </div>

  </div>
</main>

<div id="admin-panel" class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[95vw] max-w-[420px] bg-[#07090e]/95 backdrop-blur-3xl border border-white/10 rounded-3xl shadow-[0_30px_60px_rgba(0,0,0,0.8)] z-[100] flex flex-col text-gray-200 overflow-hidden">
  <div id="admin-header" class="bg-gradient-to-r from-black/80 to-black/60 border-b border-white/10 p-3.5 flex justify-between items-center cursor-move touch-none">
    <div class="flex items-center gap-3"><div class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.6)]"></div><span class="font-display font-black text-[10px] uppercase tracking-widest text-white">Panel Administrador</span></div>
    <button id="btn-close-admin" class="w-8 h-8 rounded-xl hover:bg-white/15 text-gray-400 hover:text-white transition-colors flex items-center justify-center"><i class="fa-solid fa-power-off"></i></button>
  </div>
  <div class="flex bg-black/50 text-[10px] font-bold uppercase tracking-widest border-b border-white/5">
    <button id="tab-tour" class="flex-1 py-3.5 text-djCyan border-b-2 border-djCyan bg-white/[0.03] transition-colors">Gira</button>
    <button id="tab-setup" class="flex-1 py-3.5 text-gray-500 hover:text-white transition-colors border-b-2 border-transparent">Setup</button>
    <button id="tab-mashups" class="flex-1 py-3.5 text-gray-500 hover:text-white transition-colors border-b-2 border-transparent">Tracks</button>
  </div>
  <div class="p-4 overflow-y-auto max-h-[70vh] space-y-3.5 custom-scrollbar bg-gradient-to-b from-transparent to-black/30">
    <div id="sec-a-tour" class="space-y-3">
      <input type="hidden" id="a-muni-id"><input type="hidden" id="a-ev-id">
      <div class="flex gap-3"><input type="text" id="a-muni-name" placeholder="ID Zona" class="admin-input flex-[2]"><select id="a-muni-status" class="admin-input flex-[1] px-2"><option value="locked">Oculto</option><option value="unlocked">Activo</option></select></div>
      <div id="a-ev-list" class="space-y-1.5 bg-black/40 p-2.5 rounded-xl border border-white/5 max-h-32 overflow-y-auto custom-scrollbar"></div>
      <div class="pt-3 border-t border-white/5 space-y-2.5">
        <label id="a-ev-t" class="text-[10px] text-djCyan font-bold flex items-center uppercase tracking-widest"><i class="fa-solid fa-plus mr-2"></i> Fecha</label>
        <div class="grid grid-cols-2 gap-3"><input type="text" id="a-ev-p" placeholder="Sala" class="admin-input"><input type="date" id="a-ev-d" class="admin-input [color-scheme:dark]"></div>
        <textarea id="a-ev-desc" placeholder="Detalles..." class="admin-input h-14 resize-none"></textarea>
        <input type="text" id="a-ev-m" placeholder="URL Tickets" class="admin-input"><textarea id="a-ev-embed" placeholder="Iframe Embed" class="admin-input h-12 resize-none"></textarea>
        <div class="flex gap-3 pt-1"><button id="btn-sv-ev" class="flex-[3] bg-djCyan hover:bg-[#00cce6] text-black font-black py-2.5 rounded-xl text-[11px] uppercase transition-colors shadow-[0_0_15px_rgba(0,229,255,0.4)]">Guardar</button><button id="btn-cl-ev" class="hidden flex-[1] bg-white/5 hover:bg-white/10 rounded-xl border border-white/10 transition-colors"><i class="fa-solid fa-rotate-left"></i></button></div>
      </div>
    </div>
    
    <div id="sec-a-setup" class="space-y-3 hidden">
      <select id="a-comp-sel" class="admin-input"><option value="NEW">✨ NUEVO HARDWARE</option></select>
      <input type="text" id="a-comp-t" placeholder="Modelo" class="admin-input focus:border-djMagenta">
      <textarea id="a-comp-d" placeholder="Especificaciones..." class="admin-input h-20 resize-none focus:border-djMagenta"></textarea>
      
      <div class="bg-black/50 p-3 rounded-xl border border-white/5 space-y-2">
        <div class="flex justify-between items-center mb-1">
          <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"><i class="fa-solid fa-draw-polygon mr-2"></i> Polígonos</span>
          <button id="btn-add-fig" class="bg-djMagenta/20 hover:bg-djMagenta/40 text-djMagenta px-3 py-1.5 rounded-lg border border-djMagenta/40 text-[10px] font-bold transition-all"><i class="fa-solid fa-plus mr-1.5"></i> Añadir polígono</button>
        </div>
        <ul id="a-comp-figs" class="space-y-1.5 max-h-32 overflow-y-auto text-xs custom-scrollbar"></ul>
        
        <div id="draw-controls" class="hidden flex-col gap-2 mt-3 p-3 border border-djMagenta/40 bg-djMagenta/10 rounded-xl shadow-inner">
          <span class="text-[10px] text-djMagenta font-bold text-center block mb-1">Toca la imagen para añadir nodos</span>
          <ul id="a-comp-pts" class="space-y-1.5 max-h-32 overflow-y-auto text-[10px] text-gray-300 custom-scrollbar"></ul>
          <div class="flex gap-2 pt-2">
            <button id="btn-close-fig" class="flex-[2] bg-djMagenta hover:bg-[#d600c4] text-black font-black py-2 rounded-xl text-[10px] uppercase tracking-wider transition-colors"><i class="fa-solid fa-check mr-1.5"></i> Cerrar Forma</button>
            <button id="btn-cancel-fig" class="flex-[1] bg-white/10 hover:bg-white/20 text-white font-bold py-2 rounded-xl text-[10px] transition-colors">Cancelar</button>
          </div>
        </div>
      </div>
      <div class="flex gap-3 pt-1"><button id="btn-sv-cp" class="flex-[3] bg-djMagenta hover:bg-[#d600c4] text-black font-black py-2.5 rounded-xl text-[11px] uppercase transition-colors shadow-[0_0_15px_rgba(255,0,234,0.4)]">Guardar Componente</button><button id="btn-dl-cp" class="hidden flex-[1] bg-red-500/10 hover:bg-red-500/20 text-red-500 border border-red-500/30 font-bold rounded-xl text-[11px] transition-colors">Borrar</button></div>
    </div>
    
    <div id="sec-a-mashups" class="space-y-3 hidden">
      <select id="a-mash-sel" class="admin-input"><option value="NEW">✨ NUEVO TRACK</option></select>
      <input type="text" id="a-mash-t" placeholder="Título" class="admin-input focus:border-djYellow">
      <input type="text" id="a-mash-dl" placeholder="Enlace descarga" class="admin-input focus:border-djYellow">
      <input type="text" id="a-mash-sc" placeholder="URL SoundCloud" class="admin-input focus:border-djYellow">
      <div class="flex gap-3 pt-3"><button id="btn-sv-ms" class="flex-[3] bg-djYellow hover:bg-[#e6c100] text-black font-black py-2.5 rounded-xl text-[11px] uppercase transition-colors shadow-[0_0_15px_rgba(255,214,0,0.4)]">Publicar</button><button id="btn-dl-ms" class="hidden flex-[1] bg-red-500/10 hover:bg-red-500/20 text-red-500 border border-red-500/30 font-bold rounded-xl text-[11px] transition-colors">Borrar</button></div>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
