<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>DJ VAQUERO | Tour & Experiencia</title>
<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="tailwind-config.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col items-center min-h-screen relative antialiased overflow-x-hidden">
<div class="ambient-bg"><div class="ambient-glow glow-1"></div><div class="ambient-glow glow-2"></div></div>

<header class="w-full max-w-[1600px] mx-auto px-4 pt-4 pb-2 z-50 flex justify-between items-center relative">
  <div id="site-title" class="cursor-pointer select-none active:scale-95 transition-transform flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-djCyan to-blue-600 flex items-center justify-center shadow-[0_0_20px_rgba(0,229,255,0.4)]">
      <i class="fa-solid fa-bolt text-black text-lg"></i>
    </div>
    <h1 class="premium-title text-2xl md:text-3xl font-black uppercase tracking-tighter">Vaquero<span class="neon-cyan">.</span></h1>
  </div>
  <div class="flex gap-2">
    <a href="https://instagram.com/djvaquero__" target="_blank" class="social-icon social-ig"><i class="fa-brands fa-instagram"></i></a>
    <a href="https://tiktok.com/@djvaquero__" target="_blank" class="social-icon social-tk"><i class="fa-brands fa-tiktok"></i></a>
    <a href="https://soundcloud.com/djvaquero" target="_blank" class="social-icon social-sc"><i class="fa-brands fa-soundcloud"></i></a>
  </div>
</header>

<main class="w-full max-w-[1600px] mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-4 flex-grow z-10 lg:h-[88vh] mb-4">
  
  <div class="lg:col-span-8 glass-card relative flex flex-col overflow-hidden min-h-[55vh] lg:min-h-0 group">
    <div class="absolute top-4 left-4 z-30 flex items-center gap-2 pointer-events-auto w-[calc(100%-2rem)] md:w-80">
      <div class="relative flex-grow">
        <input type="text" id="search-muni" autocomplete="off" placeholder="Buscar zona en el mapa..." class="w-full bg-black/60 backdrop-blur-xl border border-white/10 pl-10 pr-4 py-2.5 text-xs rounded-xl text-white placeholder-gray-400 outline-none focus:border-djCyan transition-all shadow-lg">
        <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
        <ul id="search-results" class="absolute top-full left-0 w-full mt-2 bg-black/90 backdrop-blur-xl border border-white/10 rounded-xl hidden max-h-48 overflow-y-auto z-50 shadow-2xl custom-scrollbar"></ul>
      </div>
      <button id="btn-reset-map" class="bg-black/60 backdrop-blur-xl border border-white/10 hover:border-djCyan hover:text-djCyan w-10 h-10 rounded-xl flex items-center justify-center text-gray-400 transition-all shadow-lg shrink-0"><i class="fa-solid fa-expand text-xs"></i></button>
    </div>

    <div class="absolute inset-0 bg-[#020305] cursor-grab flex items-center justify-center" id="tour-viewport">
      <div class="zoom-layer" id="tour-layer"></div>
    </div>

    <aside id="info-overlay" class="slide-overlay absolute top-0 right-0 w-full md:w-[380px] h-full bg-[#07090e]/95 backdrop-blur-2xl border-l border-white/10 shadow-[-20px_0_50px_rgba(0,0,0,0.7)] z-40 flex flex-col pointer-events-auto">
      <div class="p-5 border-b border-white/10 bg-white/[0.02] shrink-0 flex justify-between items-start">
        <div class="pr-4">
          <h3 id="info-title" class="text-xl font-display font-black text-white uppercase tracking-tighter mb-1 line-clamp-1">ZONA</h3>
          <div id="info-status" class="flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full bg-gray-600"></div><span class="text-gray-400 text-[9px] font-bold tracking-widest uppercase">Selecciona zona</span></div>
        </div>
        <button id="btn-close-tour" class="w-7 h-7 flex items-center justify-center rounded-lg bg-white/5 hover:bg-red-500/20 hover:text-red-400 text-gray-400 transition-all shrink-0"><i class="fa-solid fa-times text-xs"></i></button>
      </div>
      <div id="info-events" class="flex-grow flex flex-col gap-3 p-5 overflow-y-auto custom-scrollbar"></div>
    </aside>
  </div>

  <div class="lg:col-span-4 flex flex-col gap-4 h-full">
    
    <div class="glass-card flex-1 min-h-[35vh] lg:min-h-0 relative flex flex-col overflow-hidden">
      <div class="absolute top-4 left-4 z-30 pointer-events-none flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-djMagenta/10 flex items-center justify-center border border-djMagenta/20 text-djMagenta shadow-[0_0_10px_rgba(255,0,234,0.2)]"><i class="fa-solid fa-sliders text-xs"></i></div>
        <h2 class="font-display font-black text-sm text-white uppercase tracking-wider">Hardware</h2>
      </div>

      <div class="absolute inset-0 bg-[#020305] flex justify-center items-center p-4 pt-14">
        <div id="setup-wrapper" class="relative max-w-full max-h-full inline-block select-none touch-none overflow-hidden rounded-xl">
          <img src="setup.png" alt="Setup" class="w-auto h-auto max-w-full max-h-[25vh] lg:max-h-[35vh] object-contain drop-shadow-2xl" id="setup-img" draggable="false">
          <svg id="setup-svg" viewBox="0 0 100 100" preserveAspectRatio="none" class="absolute top-0 left-0 w-full h-full pointer-events-none z-20"></svg>
          <div id="admin-pts" class="absolute inset-0 pointer-events-none z-40 hidden"></div>
        </div>
      </div>

      <aside id="setup-overlay" class="slide-overlay absolute inset-0 bg-[#07090e]/95 backdrop-blur-xl z-40 flex flex-col pointer-events-auto">
        <div class="p-4 border-b border-white/10 bg-white/[0.02] shrink-0 flex justify-between items-start">
          <div>
            <div id="setup-status" class="flex items-center gap-1.5 mb-1"><div class="w-1.5 h-1.5 rounded-full bg-gray-600"></div><span class="text-gray-400 text-[8px] font-bold tracking-widest uppercase">Esperando</span></div>
            <h3 id="setup-t" class="text-base font-display font-black text-white uppercase tracking-tighter line-clamp-1"></h3>
          </div>
          <button id="btn-close-setup" class="w-7 h-7 flex items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 text-gray-400 transition-all shrink-0"><i class="fa-solid fa-times text-xs"></i></button>
        </div>
        <div class="flex-grow p-4 overflow-y-auto custom-scrollbar">
          <p id="setup-d" class="text-gray-300 text-xs leading-relaxed font-medium"></p>
        </div>
      </aside>
    </div>

    <div class="glass-card flex-1 min-h-[35vh] lg:min-h-0 flex flex-col overflow-hidden relative">
      <div class="p-4 border-b border-white/5 shrink-0 flex items-center gap-2 bg-white/[0.01]">
        <div class="w-8 h-8 rounded-lg bg-djYellow/10 flex items-center justify-center border border-djYellow/20 text-djYellow shadow-[0_0_10px_rgba(255,214,0,0.2)]"><i class="fa-solid fa-compact-disc text-xs animate-spin" style="animation-duration: 4s;"></i></div>
        <h2 class="font-display font-black text-sm text-white uppercase tracking-wider">Tracks <span class="text-djYellow">&</span> Edits</h2>
      </div>
      <div id="mashups-grid" class="flex-grow overflow-y-auto custom-scrollbar p-4 grid grid-cols-1 sm:grid-cols-2 gap-3 content-start"></div>
    </div>
  </div>
</main>

<div id="admin-panel" class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 max-w-[95vw] w-[400px] bg-[#07090e]/95 backdrop-blur-3xl border border-white/10 rounded-2xl shadow-[0_30px_60px_rgba(0,0,0,0.9)] z-[100] flex flex-col overflow-hidden text-gray-200">
  <div id="admin-header" class="bg-black/60 border-b border-white/10 p-3 flex justify-between items-center cursor-move touch-none">
    <div class="flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444] animate-pulse"></div><span class="text-white font-display font-black text-[9px] tracking-widest pointer-events-none uppercase">Admin Core</span></div>
    <button id="btn-close-admin" class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-white/10 text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-power-off text-xs"></i></button>
  </div>
  <div class="flex bg-black/40 text-[9px] font-bold uppercase tracking-widest border-b border-white/5">
    <button id="tab-tour" class="flex-1 py-3 text-djCyan border-b border-djCyan bg-white/[0.02]">Gira</button>
    <button id="tab-setup" class="flex-1 py-3 text-gray-500 border-b border-transparent hover:text-white transition-colors">Setup</button>
    <button id="tab-mashups" class="flex-1 py-3 text-gray-500 border-b border-transparent hover:text-white transition-colors">Tracks</button>
  </div>
  <div class="p-4 overflow-y-auto max-h-[60vh] space-y-3 custom-scrollbar">
    <div id="sec-a-tour" class="space-y-3">
      <input type="hidden" id="a-muni-id"><input type="hidden" id="a-ev-id">
      <div class="flex gap-2">
        <input type="text" id="a-muni-name" placeholder="ID Zona" class="admin-input flex-[2]">
        <select id="a-muni-status" class="admin-input flex-[1] px-1"><option value="locked">Oculto</option><option value="unlocked">Activo</option></select>
      </div>
      <div id="a-ev-list" class="space-y-1 bg-black/30 p-2 rounded-xl border border-white/5 max-h-24 overflow-y-auto custom-scrollbar"></div>
      <div class="pt-2 border-t border-white/5 space-y-2">
        <label id="a-ev-t" class="text-[9px] text-djCyan font-bold flex items-center uppercase tracking-widest"><i class="fa-solid fa-plus mr-1.5"></i> Fecha</label>
        <div class="grid grid-cols-2 gap-2"><input type="text" id="a-ev-p" placeholder="Sala" class="admin-input"><input type="date" id="a-ev-d" class="admin-input [color-scheme:dark]"></div>
        <textarea id="a-ev-desc" placeholder="Detalles..." class="admin-input h-12 resize-none"></textarea>
        <input type="text" id="a-ev-m" placeholder="URL Tickets" class="admin-input">
        <textarea id="a-ev-embed" placeholder="Iframe Embed" class="admin-input h-10 resize-none"></textarea>
        <div class="flex gap-2"><button id="btn-sv-ev" class="flex-[3] bg-djCyan text-black font-black py-2 rounded-xl text-[10px] uppercase shadow-[0_0_10px_rgba(0,229,255,0.3)]">Guardar</button><button id="btn-cl-ev" class="hidden flex-[1] bg-white/5 text-white rounded-xl border border-white/10"><i class="fa-solid fa-rotate-left"></i></button></div>
      </div>
    </div>
    <div id="sec-a-setup" class="space-y-3 hidden">
      <select id="a-comp-sel" class="admin-input"><option value="NEW">✨ NUEVO HARDWARE</option></select>
      <input type="text" id="a-comp-t" placeholder="Modelo" class="admin-input focus:border-djMagenta"><textarea id="a-comp-d" placeholder="Especificaciones..." class="admin-input h-16 resize-none focus:border-djMagenta"></textarea>
      <div class="bg-black/40 p-2 rounded-xl border border-white/5 space-y-1.5">
        <ul id="a-comp-figs" class="space-y-1 max-h-20 overflow-y-auto text-xs custom-scrollbar"></ul>
        <ul id="a-comp-pts" class="space-y-1 max-h-16 overflow-y-auto text-[9px] text-gray-400 custom-scrollbar"></ul>
        <div class="flex gap-2 pt-1"><button id="btn-add-fig" class="flex-1 bg-white/5 text-white font-bold py-1.5 rounded-lg text-[9px]">Cerrar Figura</button><button id="btn-cl-pts" class="flex-1 bg-red-500/10 text-red-400 font-bold py-1.5 rounded-lg text-[9px]">Limpiar</button></div>
      </div>
      <div class="flex gap-2"><button id="btn-sv-cp" class="flex-[3] bg-djMagenta text-black font-black py-2 rounded-xl text-[10px] uppercase shadow-[0_0_10px_rgba(255,0,234,0.3)]">Guardar Equipo</button><button id="btn-dl-cp" class="hidden flex-[1] bg-red-500/10 text-red-500 border border-red-500/20 font-bold rounded-xl text-[9px]">Borrar</button></div>
    </div>
    <div id="sec-a-mashups" class="space-y-3 hidden">
      <select id="a-mash-sel" class="admin-input"><option value="NEW">✨ NUEVO TRACK</option></select>
      <input type="text" id="a-mash-t" placeholder="Título" class="admin-input focus:border-djYellow">
      <input type="text" id="a-mash-dl" placeholder="Enlace descarga" class="admin-input focus:border-djYellow">
      <input type="text" id="a-mash-sc" placeholder="URL SoundCloud" class="admin-input focus:border-djYellow">
      <div class="flex gap-2 pt-2"><button id="btn-sv-ms" class="flex-[3] bg-djYellow text-black font-black py-2 rounded-xl text-[10px] uppercase shadow-[0_0_10px_rgba(255,214,0,0.3)]">Publicar</button><button id="btn-dl-ms" class="hidden flex-[1] bg-red-500/10 text-red-500 border border-red-500/20 font-bold rounded-xl text-[9px]">Borrar</button></div>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
